
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Program — PRIMORDIS</title>
<meta name="description" content="The PRIMORDIS open research program: empirical base, hypotheses, falsification criteria and open questions.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--maxw:1080px;--font-display:'Spectral',Georgia,serif;--font-body:'IBM Plex Sans',-apple-system,sans-serif;--font-mono:'IBM Plex Mono',monospace;}
html[data-theme="dark"]{--bg:#101418;--bg-soft:#141A20;--surface:#1A2129;--surface-2:#1F2731;--text:#E6EAED;--text-soft:#C3CBD2;--muted:#8E99A3;--line:#2B343E;--line-soft:#222B34;--accent:#D2904F;--accent-soft:rgba(210,144,79,.13);--accent-2:#86A9BD;--header-bg:rgba(16,20,24,.84);--shadow:0 12px 36px rgba(0,0,0,.4);--obs-bg:rgba(134,169,189,.07);--hyp-bg:rgba(210,144,79,.07);--fals-bg:rgba(180,100,100,.07);--fals-accent:#C06060;--open-bg:rgba(120,160,120,.07);--open-accent:#70A070;}
html[data-theme="light"]{--bg:#F2F3F1;--bg-soft:#ECEEEC;--surface:#FAFBFA;--surface-2:#FFFFFF;--text:#21262B;--text-soft:#3A434B;--muted:#5C6770;--line:#D7DCDE;--line-soft:#E2E6E7;--accent:#A05A19;--accent-soft:rgba(160,90,25,.09);--accent-2:#3E6478;--header-bg:rgba(242,243,241,.88);--shadow:0 10px 30px rgba(30,40,50,.08);--obs-bg:rgba(62,100,120,.06);--hyp-bg:rgba(160,90,25,.06);--fals-bg:rgba(160,80,80,.06);--fals-accent:#A04040;--open-bg:rgba(80,120,80,.06);--open-accent:#507050;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{overflow-x:hidden;scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
::selection{background:var(--accent-soft);}a{color:inherit;text-decoration:none;}
.spine{position:fixed;left:34px;top:0;bottom:0;width:1px;background:var(--line-soft);z-index:0;pointer-events:none;}
@media(max-width:1180px){.spine{display:none;}}
header{position:sticky;top:0;z-index:50;background:var(--header-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft);}
.header-in{max-width:var(--maxw);margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;gap:20px;}
.logo{display:flex;align-items:center;gap:11px;flex:none;}
.logo-mark{width:14px;height:26px;position:relative;flex:none;}
.logo-mark::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:1.5px;background:var(--text);transform:translateX(-50%);}
.logo-mark::after{content:"";position:absolute;left:50%;top:5px;width:7px;height:7px;border-radius:50%;background:var(--accent);transform:translateX(calc(-50% + 4px));}
.logo-word{font-weight:600;letter-spacing:.22em;font-size:14px;}
nav.main{display:flex;align-items:center;gap:2px;margin-left:auto;overflow:hidden;}
nav.main a{font-size:12px;color:var(--muted);padding:5px 8px;border-radius:6px;white-space:nowrap;transition:color .18s,background .18s;}
nav.main a:hover{color:var(--text);background:var(--surface);}
nav.main a.active{color:var(--accent);}
nav.main a.nav-term{font-family:var(--font-mono);font-size:11px;color:var(--accent);border:1px solid var(--accent-soft);border-radius:5px;padding:4px 7px;letter-spacing:.04em;}
nav.main a.nav-term:hover{background:var(--accent-soft);}
.controls{display:flex;align-items:center;gap:8px;flex:none;margin-left:12px;}
.lang{display:flex;flex-wrap:wrap;border:1px solid var(--line);border-radius:7px;overflow:hidden;}
.lang button{font-family:var(--font-mono);font-size:12px;padding:4px 7px;border:none;cursor:pointer;background:transparent;color:var(--muted);transition:.18s;flex:1 1 auto;min-width:28px;white-space:nowrap;}
.lang button.on{background:var(--accent-soft);color:var(--accent);font-weight:500;}
.theme-btn{width:32px;height:30px;border:1px solid var(--line);border-radius:7px;cursor:pointer;background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:.18s;flex:none;}
.burger-btn{display:none;width:32px;height:30px;border:1px solid var(--line);border-radius:7px;cursor:pointer;background:transparent;color:var(--muted);align-items:center;justify-content:center;flex:none;}
@media(max-width:1180px){nav.main a[href="atlas.html"],nav.main a[href="anthroponomy.html"]{display:none;}}
@media(max-width:980px){nav.main{display:none;}.burger-btn{display:flex;}.controls{margin-left:auto;}.lang{max-width:calc(100vw - 120px);flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;}.lang::-webkit-scrollbar{display:none;}.lang button{padding:4px 6px;font-size:11.5px;white-space:nowrap;flex:none;}}
@media(max-width:600px){.header-in{padding:0 16px;height:56px;gap:8px;}.lang{max-width:calc(100vw - 120px);}.lang button{padding:3px 5px;font-size:11px;}.theme-btn,.burger-btn{width:30px;height:28px;}}
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:80;opacity:0;transition:opacity .25s;}
.drawer-overlay.open{display:block;opacity:1;}
.mobile-drawer{position:fixed;top:0;right:0;bottom:0;width:min(300px,85vw);background:var(--surface);border-left:1px solid var(--line-soft);z-index:90;transform:translateX(100%);transition:transform .28s ease;display:flex;flex-direction:column;overflow-y:auto;}
.mobile-drawer.open{transform:translateX(0);}
html[dir="rtl"] .mobile-drawer{right:auto;left:0;border-left:none;border-right:1px solid var(--line-soft);transform:translateX(-100%);}
html[dir="rtl"] .mobile-drawer.open{transform:translateX(0);}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 16px;border-bottom:1px solid var(--line-soft);}
.drawer-title{font-weight:600;letter-spacing:.18em;font-size:13px;}
.drawer-header button{background:transparent;border:none;cursor:pointer;color:var(--muted);padding:4px;display:flex;}
.drawer-links{display:flex;flex-direction:column;padding:12px 8px;flex:1;}
.drawer-links a{font-size:15px;color:var(--text-soft);padding:13px 14px;border-radius:8px;transition:background .18s,color .18s;}
.drawer-links a:hover{background:var(--surface-2);color:var(--text);}
.drawer-links a.nav-term{font-family:var(--font-mono);color:var(--accent);font-size:13px;letter-spacing:.06em;}
.drawer-links a.active{color:var(--accent);}
.drawer-lang{padding:16px;border-top:1px solid var(--line-soft);display:flex;flex-wrap:wrap;gap:4px;}
.drawer-lang button{font-family:var(--font-mono);font-size:12px;padding:5px 9px;border:1px solid var(--line);border-radius:5px;cursor:pointer;background:transparent;color:var(--muted);transition:.18s;}
.drawer-lang button.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-soft);}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;position:relative;z-index:1;}
section{padding:80px 0;border-bottom:1px solid var(--line-soft);}
section:last-of-type{border-bottom:none;}
.eyebrow{font-family:var(--font-mono);font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.eyebrow::before{content:"";width:26px;height:1px;background:var(--accent);}
h2{font-family:var(--font-display);font-weight:400;font-size:clamp(26px,3.8vw,38px);letter-spacing:-.01em;margin-bottom:16px;}
.lead{font-size:17px;color:var(--text-soft);max-width:700px;}
.note{padding:16px 20px;border-left:2px solid var(--accent);background:var(--accent-soft);border-radius:0 8px 8px 0;font-size:14px;color:var(--text-soft);}
.note b{color:var(--text);}
.btn{display:inline-flex;align-items:center;border-radius:9px;font-size:15px;font-weight:500;padding:13px 24px;transition:.22s;cursor:pointer;border:1px solid transparent;}
.btn-primary{background:var(--accent);color:#14110C;}
html[data-theme="light"] .btn-primary{color:#FFF8F0;}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px);}
.btn-ghost{border-color:var(--line);color:var(--text-soft);}
.btn-ghost:hover{border-color:var(--muted);color:var(--text);}
.page-hero{padding:80px 0 64px;border-bottom:1px solid var(--line-soft);}
.breadcrumb{font-family:var(--font-mono);font-size:12.5px;color:var(--muted);letter-spacing:.1em;display:flex;align-items:center;gap:8px;margin-bottom:28px;}
.breadcrumb a{color:var(--muted);transition:color .2s;}
.breadcrumb a:hover{color:var(--accent);}
.breadcrumb span{color:var(--line);}
.page-hero h1{font-family:var(--font-display);font-weight:400;font-size:clamp(32px,4.8vw,52px);letter-spacing:-.015em;line-height:1.1;margin-bottom:24px;}
.page-hero h1 em{font-style:italic;color:var(--accent);}
.program-meta{margin-top:36px;display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--line-soft);border-radius:12px;overflow:hidden;}
.pm-cell{padding:20px;border-right:1px solid var(--line-soft);}
.pm-cell:last-child{border-right:none;}
.pm-label{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.pm-val{font-family:var(--font-mono);font-size:18px;color:var(--accent);}
.pm-sub{font-size:13px;color:var(--muted);margin-top:2px;}
@media(max-width:700px){.program-meta{grid-template-columns:repeat(2,1fr);}.pm-cell:nth-child(2){border-right:none;}.pm-cell:nth-child(3){border-top:1px solid var(--line-soft);}}
@media(max-width:400px){.program-meta{grid-template-columns:1fr;}.pm-cell{border-right:none;border-top:1px solid var(--line-soft);}.pm-cell:first-child{border-top:none;}}
.epist-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:40px;}
.epist-card{border-radius:12px;padding:24px;border:1px solid var(--line-soft);}
.epist-card.obs{background:var(--obs-bg);border-color:rgba(134,169,189,.2);}
.epist-card.hyp{background:var(--hyp-bg);border-color:rgba(210,144,79,.2);}
.epist-card.fals{background:var(--fals-bg);border-color:rgba(180,100,100,.15);}
.epist-card.open{background:var(--open-bg);border-color:rgba(120,160,120,.15);}
.epist-tag{font-family:var(--font-mono);font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;display:inline-block;padding:3px 10px;border-radius:4px;}
.epist-card.obs .epist-tag{color:var(--accent-2);background:rgba(134,169,189,.15);}
.epist-card.hyp .epist-tag{color:var(--accent);background:rgba(210,144,79,.15);}
.epist-card.fals .epist-tag{color:var(--fals-accent);background:rgba(180,100,100,.12);}
.epist-card.open .epist-tag{color:var(--open-accent);background:rgba(120,160,120,.12);}
.epist-card h3{font-family:var(--font-display);font-weight:400;font-size:19px;margin-bottom:8px;}
.epist-card p{font-size:14px;color:var(--text-soft);line-height:1.65;}
@media(max-width:640px){.epist-grid{grid-template-columns:1fr;}}
.emp-table{margin-top:36px;display:flex;flex-direction:column;gap:0;}
.emp-row{display:grid;grid-template-columns:240px 1fr;border-top:1px solid var(--line-soft);}
.emp-row:last-child{border-bottom:1px solid var(--line-soft);}
.emp-key{font-family:var(--font-mono);font-size:13px;color:var(--accent);padding:22px 24px;border-right:1px solid var(--line-soft);display:flex;align-items:center;letter-spacing:.04em;}
.emp-val{padding:22px 24px;font-size:15px;color:var(--text-soft);line-height:1.7;}
.emp-val strong{color:var(--text);}
@media(max-width:640px){.emp-row{grid-template-columns:1fr;}.emp-key{border-right:none;padding-bottom:4px;}.emp-val{padding-top:6px;}}
.lakatos{margin-top:44px;padding:28px 32px;background:var(--surface);border:1px solid var(--line-soft);border-radius:14px;max-width:760px;}
.lakatos-label{font-family:var(--font-mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.lakatos-row{display:flex;gap:16px;margin-bottom:10px;align-items:flex-start;}
.lakatos-row:last-child{margin-bottom:0;}
.lakatos-tag{font-family:var(--font-mono);font-size:11.5px;padding:3px 10px;border-radius:4px;flex:none;min-width:96px;text-align:center;}
.lakatos-tag.hard{background:rgba(134,169,189,.15);color:var(--accent-2);}
.lakatos-tag.belt{background:rgba(210,144,79,.12);color:var(--accent);}
.lakatos-val{font-size:14px;color:var(--text-soft);line-height:1.55;}
.hyp-list{display:flex;flex-direction:column;gap:0;margin-top:36px;}
.hyp-item{border-top:1px solid var(--line-soft);padding:36px 0;}
.hyp-item:last-child{border-bottom:1px solid var(--line-soft);}
.hyp-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px;}
.hyp-id{font-family:var(--font-mono);font-size:12px;letter-spacing:.12em;color:var(--accent);border:1px solid var(--accent-soft);border-radius:5px;padding:4px 10px;flex:none;background:var(--accent-soft);}
.hyp-status{font-family:var(--font-mono);font-size:11.5px;letter-spacing:.08em;border:1px solid var(--line-soft);border-radius:5px;padding:4px 10px;flex:none;color:var(--muted);}
.hyp-name{font-family:var(--font-display);font-weight:400;font-size:clamp(18px,2.5vw,24px);margin-bottom:12px;}
.hyp-statement{font-size:15.5px;color:var(--text-soft);line-height:1.75;max-width:740px;margin-bottom:20px;}
.hyp-statement em{font-style:italic;color:var(--text);}
.hyp-section-label{font-family:var(--font-mono);font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.hyp-sub{font-size:14px;color:var(--muted);line-height:1.65;max-width:680px;margin-bottom:20px;}
.hyp-falsif{padding:14px 18px;background:var(--fals-bg);border:1px solid rgba(180,100,100,.15);border-radius:8px;font-size:14px;color:var(--text-soft);max-width:680px;}
.hyp-falsif strong{color:var(--fals-accent);font-family:var(--font-mono);font-size:12px;letter-spacing:.08em;display:block;margin-bottom:6px;}
.oq-list{display:flex;flex-direction:column;gap:12px;margin-top:36px;}
.oq-item{display:grid;grid-template-columns:36px 1fr;gap:16px;padding:20px;background:var(--surface);border:1px solid var(--line-soft);border-radius:10px;align-items:start;}
.oq-num{font-family:var(--font-mono);font-size:12px;color:var(--open-accent);padding-top:2px;}
.oq-text{font-size:15px;color:var(--text-soft);line-height:1.65;}
.oq-text strong{color:var(--text);}
.progress-section{margin-top:40px;}
.prog-item{margin-bottom:24px;}
.prog-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.prog-label{font-family:var(--font-mono);font-size:13px;color:var(--text-soft);}
.prog-pct{font-family:var(--font-mono);font-size:12px;color:var(--accent);}
.prog-bar{height:4px;background:var(--line-soft);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width 1.1s ease .2s;}
.cta-strip{padding:64px 0;background:var(--bg-soft);}
.cta-inner{display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap;}
.cta-copy h2{font-family:var(--font-display);font-weight:400;font-size:clamp(22px,3vw,30px);margin-bottom:10px;}
.cta-copy p{font-size:16px;color:var(--text-soft);max-width:520px;}
footer{border-top:1px solid var(--line-soft);padding:44px 0 52px;background:var(--bg-soft);}
.foot-grid{display:flex;justify-content:space-between;gap:30px;flex-wrap:wrap;}
.foot-left p{font-size:14px;color:var(--muted);}
.foot-left p:first-child{color:var(--text-soft);font-weight:500;margin-bottom:4px;}
.foot-right{font-family:var(--font-mono);font-size:12.5px;color:var(--muted);text-align:right;line-height:2.2;}
.foot-email a{color:var(--muted);transition:color .2s;}
.foot-email a:hover{color:var(--text);}
@media(max-width:680px){.foot-right{text-align:left;}}
.reveal{opacity:0;transform:translateY(14px);transition:opacity .65s ease,transform .65s ease;}
.reveal.in{opacity:1;transform:none;}
@media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none;}html{scroll-behavior:auto;}}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px;}
html[dir="rtl"] .eyebrow{flex-direction:row-reverse;}html[dir="rtl"] .eyebrow::before{order:1;}
html[dir="rtl"] .note{border-left:none;border-right:2px solid var(--accent);border-radius:8px 0 0 8px;}
html[dir="rtl"] .emp-key{border-right:none;border-left:1px solid var(--line-soft);}
html[dir="rtl"] .spine{left:auto;right:34px;}
@media(max-width:600px){section{padding:52px 0;}.page-hero{padding:48px 0 44px;}.wrap{padding:0 16px;}}
</style>
</head>

</header>

    <button type="button" id="drawerClose"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg></button>
  </div>
  <div class="drawer-links">
    <a href="index.html" data-i18n="nav_home"></a><a href="framework.html" data-i18n="nav_framework"></a>

    <a href="research.html" data-i18n="nav_research" class="active"></a>
    <a href="primordocciput.html" class="nav-term" data-i18n="nav_primordocciput"></a>
    <a href="atlas.html" data-i18n="nav_atlas"></a><a href="anthroponomy.html" data-i18n="nav_anthroponomy"></a>
  </div>
  <div class="drawer-lang">
    <button type="button" data-lang="en">EN</button><button type="button" data-lang="de">DE</button>

const I18N={en:{nav_home:"Home",nav_framework:"Framework",nav_assessment:"Assessment",nav_cases:"Cases",nav_research:"Research",nav_primordocciput:"PRIMORDOCCIPUT",nav_atlas:"Atlas",nav_anthroponomy:"Anthroponomy",h_title:"Research <em>Program</em>.",h_lead:"PRIMORDIS is built as an open research program. Its claims are organized to be testable — and where they are wrong, correctable. This page describes the empirical base, the hypotheses under study, and the questions that remain open.",pm1_l:"Documented cases",pm1_s:"in the clinical archive",pm2_l:"Years of practice",pm2_s:"structured observation",pm3_l:"Active hypotheses",pm3_s:"under formal study",pm4_l:"Status",pm4_v:"Open",pm4_s:"all claims revisable",ep_eyebrow:"01 · Epistemic framework",ep_title:"Four categories. Always labeled.",ep_lead:"Every claim on this platform belongs to one of four categories. The category is always stated. Observations and hypotheses are never mixed without notice.",ep_obs_tag:"Observation",ep_obs_t:"What has been seen",ep_obs_b:"A documented pattern across cases — recorded, structured, reproducible in the archive. Observations are the empirical floor. They do not explain themselves.",ep_hyp_tag:"Hypothesis",ep_hyp_t:"What may explain it",ep_hyp_b:"A proposed mechanism or causal account of an observed pattern. Hypotheses are stated as such. They are testable and falsifiable by design.",ep_fals_tag:"Falsification",ep_fals_t:"Under what conditions it fails",ep_fals_b:"Every core hypothesis is paired with explicit conditions under which it would be considered false. This is the minimum requirement for intellectual honesty.",ep_open_tag:"Open question",ep_open_t:"What we do not know",ep_open_b:"Acknowledged gaps — mechanisms not understood, boundaries not established, populations not studied. Open questions are part of the program, not admissions of failure.",base_eyebrow:"02 · Empirical base",base_title:"What the archive contains.",base_lead:"The empirical base is the structured clinical archive accumulated over 20+ years of practice. It is the floor beneath every hypothesis.",b1k:"Case volume",b1v:"<strong>6,000+ cases</strong> documented using standardized intake protocols. Each case records presenting configuration, symptom pattern, timeline of intervention, and follow-up observations.",b2k:"Documentation standard",b2v:"Primordis Clinical Corpus Standard (PCCS v3.0) — structured intake and session record format designed for AI-readiness and cross-case comparison. Fields include axis deviation, compensation chain levels, PSI score, DL level, symptom coordinates by side.",b3k:"Follow-up coverage",b3v:"Approximately <strong>65% of cases</strong> have follow-up documentation at 3 months or longer. This subset is used for outcome observation analysis.",b4k:"Geographic distribution",b4v:"Primary: Bishkek, Kyrgyzstan. Secondary: Kazakhstan, Uzbekistan. Case population is predominantly Central Asian — a limitation acknowledged for generalization purposes.",b5k:"Imaging availability",b5v:"Imaging (X-ray, CT) available for a subset of cases. Where present, imaging is read for compensation pattern — not for pathology classification.",lak_label:"Lakatosian program structure",lak_hard_tag:"Hard core",lak_hard_v:"Configuration Primacy Principle: structural geometry precedes and constrains physiological function. This is the unfalsifiable axiom of the program — the commitment that organizes all other claims.",lak_belt_tag:"Protective belt",lak_belt_v:"The ten laws of configuration, the three measurement dimensions (PSI, DL, PP), and the specific hypotheses below — all testable, all revisable, all held provisionally.",hyp_eyebrow:"03 · Hypotheses",hyp_title:"Three hypotheses under study.",hyp_lead:"Each hypothesis is a proposed explanation for an observed pattern. Each carries explicit falsification criteria.",h_status_active:"under study",hyp_support:"Supporting observations",hyp_falsif:"Falsification criterion",falsif_label:"FALSIFIED IF:",h1_name:"The Primordocciput Hypothesis (Configuration Primacy Principle)",h1_stmt:"<em>The atlanto-occipital junction (C0) is the primary origin point of systemic structural asymmetry.</em> Displacement at C0 initiates a downward cascade of compensatory patterns — cervical, thoracic, lumbar, pelvic — that constitute the observable compensation architecture.",h1_support:"In cases where C0 configuration was addressed as the primary intervention, downstream compensation patterns showed measurable change in the majority of documented follow-ups. Bilateral imaging comparisons in a subset of cases show correlation between C0 angular deviation and thoracic scoliotic arc direction.",h1_falsif:"If systematic C0 correction consistently produces no measurable change in compensation chain load distribution — as assessed by structured follow-up protocols — the primacy of C0 requires revision. The hypothesis would also be falsified if equally consistent results were obtained by addressing non-C0 structures first.",h2_name:"The Cascade Hypothesis",h2_stmt:"<em>Resolution of the primary C0 displacement initiates a system-wide cascade of secondary changes</em> — in breathing pattern, gait, pelvic alignment, and muscle tone — without direct intervention at those secondary sites.",h2_support:"Observed in a subset of well-documented cases: follow-up at 4–12 weeks post primary intervention showed changes in reported breathing pattern, gait symmetry, and resting muscle tone — none of which were directly addressed in the intervention. Pattern is consistent but not universal.",h2_falsif:"If secondary changes (breathing, gait, tone) are not observed at rates significantly above natural variation in cases where C0 is addressed and secondary sites are not — the cascade mechanism requires revision or abandonment.",h3_name:"The Configuration-State Hypothesis",h3_stmt:"<em>Configuration asymmetry produces measurable effects on perceived state</em> — including energy level, cognitive clarity, emotional stability, and sleep quality — through neurological, vascular, and autonomic pathways influenced by structural geometry.",h3_support:"Across documented cases, changes in configuration are frequently accompanied by patient-reported changes in energy, focus, and sleep — independent of other interventions. The association is consistent; the mechanism is not established.",h3_falsif:"If structured pre/post assessment using validated state measures shows no significant difference between cases where configuration changed and cases where it did not — the configuration-state link would require revision. The hypothesis is also falsified if the effect disappears when controlling for expectancy (placebo).",oq_eyebrow:"04 · Open questions",oq_title:"What we do not know.",oq_lead:"Acknowledged gaps. These are not problems to hide — they are the frontier of the program.",oq1:"<strong>Mechanism at C0.</strong> By what neurological, vascular, or biomechanical pathway does C0 displacement produce downstream compensation? The cascade is observed; the mechanism is not established.",oq2:"<strong>Durability of change.</strong> How stable are configuration changes after intervention? Long-term follow-up data (12+ months) is sparse in the current archive. This is the most significant gap.",oq3:"<strong>Population variability.</strong> The archive is primarily Central Asian. How do compensation patterns, baselines, and response rates differ across populations with different anthropometric profiles?",oq4:"<strong>Dose-response relationship.</strong> How many sessions, at what interval, produce what degree of measurable configuration change? No systematic dose-response protocol has been run.",oq5:"<strong>Predictors of response.</strong> Which case characteristics (DL level, age, chronicity, symptom pattern) predict faster or slower response? Preliminary observations exist; formal analysis does not.",oq6:"<strong>Boundary conditions.</strong> For which configurations and presentations does PRIMORDIS not work — or work less well? The limits of the framework are as important as its scope.",stat_eyebrow:"05 · Program status",stat_title:"Where the work currently stands.",stat_lead:"Four dimensions of the research program — current completion status.",pr1_l:"Clinical archive documentation (PCCS v3.0)",pr2_l:"Follow-up coverage (≥3 months)",pr3_l:"Structured case publication",pr4_l:"Controlled study protocol",stat_note:"<b>Epistemic status of this page:</b> all figures are practitioner estimates from the clinical archive. They have not been independently verified. The research program is pre-publication. Claims on this page are observations and hypotheses, labeled as such.",cta_title:"The hypothesis in full.",cta_lead:"PRIMORDOCCIPUT — the central hypothesis of the program — is described in detail on its own page, including the clinical observations that support it and the conditions under which it would be considered false.",cta_btn1:"Read PRIMORDOCCIPUT \u2192",cta_btn2:"View case observations",f_line2:"Part of the emerging discipline of Anthroponomy.",f_disc:"Educational and research content. Not medical advice.",f_rights:"\u00a9 2026 PRIMORDIS. Observations and hypotheses labeled as such."},de:{nav_home:"Start",nav_framework:"Framework",nav_assessment:"Erfassung",nav_cases:"F\u00e4lle",nav_research:"Forschung",nav_primordocciput:"PRIMORDOCCIPUT",nav_atlas:"Atlas",nav_anthroponomy:"Anthroponomie",h_title:"Forschungs<em>programm</em>.",h_lead:"PRIMORDIS ist als offenes Forschungsprogramm aufgebaut. Seine Aussagen sind testbar — und wo sie falsch sind, korrigierbar.",pm1_l:"Dokumentierte F\u00e4lle",pm1_s:"im klinischen Archiv",pm2_l:"Jahre Praxis",pm2_s:"strukturierte Beobachtung",pm3_l:"Aktive Hypothesen",pm3_s:"unter formaler Untersuchung",pm4_l:"Status",pm4_v:"Offen",pm4_s:"alle Aussagen revidierbar",ep_eyebrow:"01 \u00b7 Epistemischer Rahmen",ep_title:"Vier Kategorien. Immer gekennzeichnet.",ep_lead:"Jede Aussage auf dieser Plattform geh\u00f6rt zu einer von vie function openDrawer(){drawer.classList.add("open");overlay.classList.add("open");drawer.setAttribute("aria-hidden","false");burger.setAttribute("aria-expanded","true");document.body.style.overflow="hidden";}
function closeDrawer(){drawer.classList.remove("open");overlay.classList.remove("open");drawer.setAttribute("aria-hidden","true");burger.setAttribute("aria-expanded","false");document.body.style.overflow="";}
burger&&burger.addEventListener("click",openDrawer);dClose&&dClose.addEventListener("click",closeDrawer);overlay&&overlay.addEventListener("click",closeDrawer);
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDrawer();});
document.querySelectorAll(".drawer-links a").forEach(a=>a.addEventListener("click",closeDrawer));
const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");e.target.querySelectorAll(".prog-fill[data-target]").forEach(bar=>{bar.style.width=bar.dataset.target+"%";});io.unobserve(e.target);}});},{threshold:0.06});
document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
applyLang(currentLang);applyTheme("dark");
</script>
</body>
</html>
