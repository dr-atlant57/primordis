<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assessment — PRIMORDIS</title>
<meta name="description" content="How PRIMORDIS reads your configuration: four steps from visual observation to a priority map. Measurement precedes recommendation — always.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --maxw:1080px;
  --font-display:'Spectral',Georgia,serif;
  --font-body:'IBM Plex Sans',-apple-system,'Segoe UI',sans-serif;
  --font-mono:'IBM Plex Mono','SF Mono',monospace;
}
html[data-theme="dark"]{
  --bg:#101418;--bg-soft:#141A20;--surface:#1A2129;--surface-2:#1F2731;
  --text:#E6EAED;--text-soft:#C3CBD2;--muted:#8E99A3;
  --line:#2B343E;--line-soft:#222B34;
  --accent:#D2904F;--accent-soft:rgba(210,144,79,.13);--accent-2:#86A9BD;
  --header-bg:rgba(16,20,24,.84);--shadow:0 10px 34px rgba(0,0,0,.35);
  --step-bg:rgba(210,144,79,.07);
}
html[data-theme="light"]{
  --bg:#F2F3F1;--bg-soft:#ECEEEC;--surface:#FAFBFA;--surface-2:#FFFFFF;
  --text:#21262B;--text-soft:#3A434B;--muted:#5C6770;
  --line:#D7DCDE;--line-soft:#E2E6E7;
  --accent:#A05A19;--accent-soft:rgba(160,90,25,.09);--accent-2:#3E6478;
  --header-bg:rgba(242,243,241,.88);--shadow:0 10px 30px rgba(30,40,50,.08);
  --step-bg:rgba(160,90,25,.05);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{overflow-x:hidden;scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
::selection{background:var(--accent-soft);}
a{color:inherit;text-decoration:none;}

/* spine */
.spine{position:fixed;left:34px;top:0;bottom:0;width:1px;background:var(--line-soft);z-index:0;pointer-events:none;}
@media(max-width:1180px){.spine{display:none;}}

/* ── header ─────────────────────────────────────────────── */
header{position:sticky;top:0;z-index:50;background:var(--header-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft);}
.header-in{max-width:var(--maxw);margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;gap:20px;}
.logo{display:flex;align-items:center;gap:11px;text-decoration:none;flex:none;}
.logo-mark{width:14px;height:26px;position:relative;flex:none;}
.logo-mark::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:1.5px;background:var(--text);transform:translateX(-50%);}
.logo-mark::after{content:"";position:absolute;left:50%;top:5px;width:7px;height:7px;border-radius:50%;background:var(--accent);transform:translateX(calc(-50% + 4px));}
.logo-word{font-weight:600;letter-spacing:.22em;font-size:14px;}
nav.main{display:flex;align-items:center;gap:2px;margin-left:auto;overflow:hidden;}
nav.main a{font-size:12px;color:var(--muted);text-decoration:none;padding:5px 8px;border-radius:6px;white-space:nowrap;transition:color .18s,background .18s;letter-spacing:.01em;}
nav.main a:hover{color:var(--text);background:var(--surface);}
nav.main a.active{color:var(--accent);}
nav.main a.nav-term{font-family:var(--font-mono);font-size:11px;color:var(--accent);border:1px solid var(--accent-soft);border-radius:5px;padding:4px 7px;letter-spacing:.04em;}
nav.main a.nav-term:hover{background:var(--accent-soft);}
.controls{display:flex;align-items:center;gap:8px;flex:none;margin-left:12px;}
.lang{display:flex;flex-wrap:wrap;border:1px solid var(--line);border-radius:7px;overflow:hidden;}
.lang button{font-family:var(--font-mono);font-size:12px;padding:4px 7px;border:none;cursor:pointer;background:transparent;color:var(--muted);transition:.18s;flex:1 1 auto;min-width:28px;white-space:nowrap;}
.lang button.on{background:var(--accent-soft);color:var(--accent);font-weight:500;}
.theme-btn{width:32px;height:30px;border:1px solid var(--line);border-radius:7px;cursor:pointer;background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:.18s;flex:none;}
.theme-btn:hover{color:var(--text);border-color:var(--muted);}
.burger-btn{display:none;width:32px;height:30px;border:1px solid var(--line);border-radius:7px;cursor:pointer;background:transparent;color:var(--muted);align-items:center;justify-content:center;flex:none;transition:.18s;}
.burger-btn:hover{color:var(--text);}
@media(max-width:1180px){nav.main a[href="atlas.html"],nav.main a[href="anthroponomy.html"]{display:none;}}
@media(max-width:980px){nav.main{display:none;}.burger-btn{display:flex;}.controls{margin-left:auto;}.lang{max-width:calc(100vw - 120px);flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;}.lang::-webkit-scrollbar{display:none;}.lang button{padding:4px 6px;font-size:11.5px;white-space:nowrap;flex:none;}}
@media(max-width:600px){.header-in{padding:0 16px;height:56px;gap:8px;}.lang{max-width:calc(100vw - 120px);}.lang button{padding:3px 5px;font-size:11px;}.theme-btn,.burger-btn{width:30px;height:28px;}}

/* ── mobile drawer ─────────────────────────────────────── */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:80;opacity:0;transition:opacity .25s;}
.drawer-overlay.open{display:block;opacity:1;}
.mobile-drawer{position:fixed;top:0;right:0;bottom:0;width:min(300px,85vw);background:var(--surface);border-left:1px solid var(--line-soft);z-index:90;transform:translateX(100%);transition:transform .28s ease;display:flex;flex-direction:column;overflow-y:auto;}
.mobile-drawer.open{transform:translateX(0);}
html[dir="rtl"] .mobile-drawer{right:auto;left:0;border-left:none;border-right:1px solid var(--line-soft);transform:translateX(-100%);}
html[dir="rtl"] .mobile-drawer.open{transform:translateX(0);}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 16px;border-bottom:1px solid var(--line-soft);}
.drawer-title{font-weight:600;letter-spacing:.18em;font-size:13px;}
.drawer-header button{background:transparent;border:none;cursor:pointer;color:var(--muted);padding:4px;border-radius:5px;display:flex;align-items:center;justify-content:center;}
.drawer-header button:hover{color:var(--text);}
.drawer-links{display:flex;flex-direction:column;padding:12px 8px;flex:1;}
.drawer-links a{font-size:15px;color:var(--text-soft);text-decoration:none;padding:13px 14px;border-radius:8px;transition:background .18s,color .18s;}
.drawer-links a:hover{background:var(--surface-2);color:var(--text);}
.drawer-links a.nav-term{font-family:var(--font-mono);color:var(--accent);font-size:13px;letter-spacing:.06em;}
.drawer-links a.active{color:var(--accent);}
.drawer-lang{padding:16px;border-top:1px solid var(--line-soft);display:flex;flex-wrap:wrap;gap:4px;}
.drawer-lang button{font-family:var(--font-mono);font-size:12px;padding:5px 9px;border:1px solid var(--line);border-radius:5px;cursor:pointer;background:transparent;color:var(--muted);transition:.18s;}
.drawer-lang button.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-soft);}

/* ── shared layout ─────────────────────────────────────── */
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;position:relative;z-index:1;}
.eyebrow{font-family:var(--font-mono);font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.eyebrow::before{content:"";width:26px;height:1px;background:var(--accent);}
h2{font-family:var(--font-display);font-weight:400;font-size:clamp(26px,3.8vw,38px);letter-spacing:-.01em;margin-bottom:16px;}
.lead{font-size:17px;color:var(--text-soft);max-width:700px;}
.note{padding:16px 20px;border-left:2px solid var(--accent);background:var(--accent-soft);border-radius:0 8px 8px 0;font-size:14px;color:var(--text-soft);max-width:700px;}
.note b{color:var(--text);font-weight:600;}
.btn{display:inline-flex;align-items:center;gap:9px;border-radius:9px;font-size:15px;font-weight:500;padding:13px 24px;transition:.22s;cursor:pointer;border:1px solid transparent;}
.btn-primary{background:var(--accent);color:#14110C;}
html[data-theme="light"] .btn-primary{color:#FFF8F0;}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px);}
.btn-ghost{border-color:var(--line);color:var(--text-soft);}
.btn-ghost:hover{border-color:var(--muted);color:var(--text);}

/* ── page hero ─────────────────────────────────────────── */
.page-hero{padding:80px 0 72px;border-bottom:1px solid var(--line-soft);}
.breadcrumb{font-family:var(--font-mono);font-size:12.5px;color:var(--muted);letter-spacing:.1em;display:flex;align-items:center;gap:8px;margin-bottom:28px;}
.breadcrumb a{color:var(--muted);transition:color .2s;}
.breadcrumb a:hover{color:var(--accent);}
.breadcrumb span{color:var(--line);}
.page-hero h1{font-family:var(--font-display);font-weight:400;font-size:clamp(34px,5vw,54px);letter-spacing:-.015em;line-height:1.1;margin-bottom:24px;}
.page-hero h1 em{font-style:italic;color:var(--accent);}
.page-hero .lead{margin-bottom:0;}
.principle-strip{margin-top:32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.principle-pill{font-family:var(--font-mono);font-size:12.5px;color:var(--accent);border:1px solid var(--accent-soft);border-radius:99px;padding:7px 16px;background:var(--accent-soft);}
@media(max-width:600px){.page-hero{padding:48px 0 44px;}}

/* ── four steps ─────────────────────────────────────────── */
section.steps{padding:80px 0;border-bottom:1px solid var(--line-soft);}
.steps-list{display:flex;flex-direction:column;gap:0;margin-top:42px;}
.step-row{display:grid;grid-template-columns:72px 1fr;border-top:1px solid var(--line-soft);transition:background .2s;}
.step-row:last-child{border-bottom:1px solid var(--line-soft);}
.step-row:hover{background:var(--step-bg);}
.step-num-col{display:flex;align-items:flex-start;justify-content:center;padding:40px 0;}
.step-num{font-family:var(--font-display);font-size:52px;font-weight:300;line-height:1;color:var(--line);letter-spacing:-.03em;transition:color .2s;}
.step-row:hover .step-num{color:var(--accent);}
.step-body{padding:40px 40px 40px 0;}
.step-label{font-family:var(--font-mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
.step-name{font-family:var(--font-display);font-weight:500;font-size:clamp(20px,2.8vw,26px);margin-bottom:14px;color:var(--text);}
.step-text{font-size:15px;color:var(--text-soft);line-height:1.75;max-width:680px;}
.step-text p{margin-bottom:10px;}
.step-text p:last-child{margin-bottom:0;}
.step-detail{margin-top:20px;display:flex;flex-wrap:wrap;gap:10px;}
.step-tag{font-family:var(--font-mono);font-size:12px;color:var(--muted);border:1px solid var(--line-soft);border-radius:5px;padding:4px 10px;}
@media(max-width:760px){
  .step-row{grid-template-columns:56px 1fr;}
  .step-num{font-size:40px;}
  .step-body{padding:32px 16px 32px 0;}
}
@media(max-width:600px){
  section.steps{padding:52px 0;}
  .step-row{grid-template-columns:1fr;}
  .step-num-col{padding:24px 0 0;}
  .step-num{font-size:32px;}
  .step-body{padding:12px 0 28px;}
}

/* ── what we observe ────────────────────────────────────── */
section.observe{padding:80px 0;border-bottom:1px solid var(--line-soft);}
.obs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:40px;}
.obs-card{background:var(--surface);border:1px solid var(--line-soft);border-radius:12px;padding:24px;transition:border-color .22s,transform .22s;}
.obs-card:hover{border-color:var(--line);transform:translateY(-2px);}
.obs-icon{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
.obs-card h3{font-family:var(--font-body);font-weight:600;font-size:15.5px;margin-bottom:8px;}
.obs-card p{font-size:14px;color:var(--muted);line-height:1.6;}
@media(max-width:860px){.obs-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:520px){.obs-grid{grid-template-columns:1fr;}}

/* ── output: config map ─────────────────────────────────── */
section.output{padding:80px 0;border-bottom:1px solid var(--line-soft);}
.map-panel{margin-top:40px;background:var(--surface);border:1px solid var(--line-soft);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
.map-row{display:grid;grid-template-columns:220px 1fr;border-bottom:1px solid var(--line-soft);}
.map-row:last-child{border-bottom:none;}
.map-key{font-family:var(--font-mono);font-size:13px;color:var(--accent);padding:22px 24px;border-right:1px solid var(--line-soft);display:flex;align-items:center;gap:10px;letter-spacing:.04em;}
.map-key .k{color:var(--muted);font-size:11px;}
.map-val{padding:22px 24px;font-size:14.5px;color:var(--text-soft);}
@media(max-width:640px){.map-row{grid-template-columns:1fr;}.map-key{border-right:none;padding-bottom:4px;}.map-val{padding-top:6px;}}

/* ── dimensions ─────────────────────────────────────────── */
section.dimensions{padding:80px 0;border-bottom:1px solid var(--line-soft);}
.dim-list{margin-top:40px;display:flex;flex-direction:column;gap:0;}
.dim-row{display:flex;gap:24px;padding:28px 0;border-top:1px solid var(--line-soft);align-items:flex-start;}
.dim-row:last-child{border-bottom:1px solid var(--line-soft);}
.dim-abbr{font-family:var(--font-mono);font-size:12px;letter-spacing:.12em;color:var(--accent);width:64px;flex:none;padding-top:3px;}
.dim-content h3{font-family:var(--font-body);font-weight:600;font-size:16px;margin-bottom:6px;}
.dim-content p{font-size:14.5px;color:var(--muted);line-height:1.65;max-width:680px;}
.dim-status{font-family:var(--font-mono);font-size:11px;color:var(--muted);border:1px solid var(--line-soft);border-radius:4px;padding:2px 7px;display:inline-block;margin-top:10px;}
.dim-status.ready{color:var(--accent);border-color:var(--accent-soft);}

/* ── self-observation ───────────────────────────────────── */
section.self{padding:80px 0;border-bottom:1px solid var(--line-soft);}
.protocol-list{margin-top:40px;display:flex;flex-direction:column;gap:12px;}
.protocol-item{display:flex;gap:16px;align-items:flex-start;padding:20px;background:var(--surface);border:1px solid var(--line-soft);border-radius:10px;}
.protocol-num{font-family:var(--font-mono);font-size:12px;color:var(--accent);width:28px;flex:none;padding-top:2px;}
.protocol-text{font-size:15px;color:var(--text-soft);line-height:1.65;}
.protocol-text strong{color:var(--text);}

/* ── principle block ────────────────────────────────────── */
section.principle-sec{padding:80px 0;}
.principle-big{font-family:var(--font-display);font-size:clamp(22px,3.5vw,36px);font-style:italic;color:var(--text-soft);line-height:1.35;max-width:760px;margin-bottom:32px;}
.principle-big strong{color:var(--text);font-style:normal;}

/* ── cta strip ──────────────────────────────────────────── */
.cta-strip{padding:72px 0;background:var(--bg-soft);}
.cta-inner{display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap;}
.cta-copy h2{font-family:var(--font-display);font-weight:400;font-size:clamp(22px,3.2vw,32px);margin-bottom:10px;}
.cta-copy p{font-size:16px;color:var(--text-soft);max-width:520px;}

/* ── footer ─────────────────────────────────────────────── */
footer{border-top:1px solid var(--line-soft);padding:44px 0 52px;background:var(--bg-soft);}
.foot-grid{display:flex;justify-content:space-between;gap:30px;flex-wrap:wrap;align-items:flex-start;}
.foot-left p{font-size:14px;color:var(--muted);}
.foot-left p:first-child{color:var(--text-soft);font-weight:500;margin-bottom:4px;}
.foot-right{font-family:var(--font-mono);font-size:12.5px;color:var(--muted);text-align:right;line-height:2.2;}
.foot-email a{color:var(--muted);transition:color .2s;}
.foot-email a:hover{color:var(--text);}
@media(max-width:680px){.foot-right{text-align:left;}}

/* ── reveal ─────────────────────────────────────────────── */
.reveal{opacity:0;transform:translateY(14px);transition:opacity .65s ease,transform .65s ease;}
.reveal.in{opacity:1;transform:none;}
@media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none;}html{scroll-behavior:auto;}}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px;}

/* RTL */
html[dir="rtl"] .eyebrow{flex-direction:row-reverse;}
html[dir="rtl"] .eyebrow::before{order:1;}
html[dir="rtl"] .map-key{border-right:none;border-left:1px solid var(--line-soft);}
html[dir="rtl"] .note{border-left:none;border-right:2px solid var(--accent);border-radius:8px 0 0 8px;}
html[dir="rtl"] .spine{left:auto;right:34px;}
</style>
</head>

let currentLang = "en", currentTheme = "dark";
(function(){
  const nav = (navigator.language||"en").toLowerCase();
  if(nav.startsWith("ru")||nav.startsWith("uk")||nav.startsWith("kk")||nav.startsWith("ky")||nav.startsWith("uz")) currentLang="ru";
  else if(nav.startsWith("de")) currentLang="de";
})();

function applyLang(lang){
  const dict = I18N[lang]||I18N.en;
  currentLang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k=el.getAttribute("data-i18n");
    if(dict[k]!==undefined) el.innerHTML=dict[k];
  });
  document.documentElement.lang=lang;
  document.documentElement.dir=lang==="ar"?"rtl":"ltr";
  document.querySelectorAll(".lang button,.drawer-lang button").forEach(b=>b.classList.toggle("on",b.dataset.lang===lang));
}

function applyTheme(t){
  currentTheme=t;
  document.documentElement.setAttribute("data-theme",t);
  const icon=document.getElementById("themeIcon");
  icon.innerHTML=t==="dark"
    ?'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>'
    :'<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>';
}

document.querySelectorAll(".lang button,.drawer-lang button").forEach(b=>b.addEventListener("click",()=>applyLang(b.dataset.lang)));
document.getElementById("themeBtn").addEventListener("click",()=>applyTheme(currentTheme==="dark"?"light":"dark"));

// drawer
const burger=document.getElementById("burgerBtn");
const drawer=document.getElementById("mobileDrawer");
const overlay=document.getElementById("drawerOverlay");
const dClose=document.getElementById("drawerClose");
function openDrawer(){drawer.classList.add("open");overlay.classList.add("open");drawer.setAttribute("aria-hidden","false");burger.setAttribute("aria-expanded","true");document.body.style.overflow="hidden";}
function closeDrawer(){drawer.classList.remove("open");overlay.classList.remove("open");drawer.setAttribute("aria-hidden","true");burger.setAttribute("aria-expanded","false");document.body.style.overflow="";}
burger&&burger.addEventListener("click",openDrawer);
dClose&&dClose.addEventListener("click",closeDrawer);
overlay&&overlay.addEventListener("click",closeDrawer);
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDrawer();});
document.querySelectorAll(".drawer-links a").forEach(a=>a.addEventListener("click",closeDrawer));

// reveal
const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}});},{threshold:0.06});
document.querySelectorAll(".reveal").forEach(el=>io.observe(el));

applyLang(currentLang);
applyTheme("dark");
</script>
