<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Framework — Laws of Configuration · PRIMORDIS</title>
<meta name="description" content="Ten laws and three axioms describing how the human body organizes itself around structural asymmetry. The theoretical foundation of PRIMORDIS.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --maxw:1080px;
  --font-display:'Spectral',Georgia,serif;
  --font-body:'IBM Plex Sans',-apple-system,'Segoe UI',sans-serif;
  --font-mono:'IBM Plex Mono','SF Mono',monospace;
}
html[data-theme="dark"]{
  --bg:#101418;--bg-soft:#141A20;--surface:#1A2129;--surface-2:#1F2731;
  --text:#E6EAED;--text-soft:#C3CBD2;--muted:#8E99A3;
  --line:#2B343E;--line-soft:#222B34;
  --accent:#D2904F;--accent-soft:rgba(210,144,79,.13);--accent-2:#86A9BD;
  --header-bg:rgba(16,20,24,.84);--shadow:0 10px 34px rgba(0,0,0,.35);
  --law-num:rgba(210,144,79,.18);
}
html[data-theme="light"]{
  --bg:#F2F3F1;--bg-soft:#ECEEEC;--surface:#FAFBFA;--surface-2:#FFFFFF;
  --text:#21262B;--text-soft:#3A434B;--muted:#5C6770;
  --line:#D7DCDE;--line-soft:#E2E6E7;
  --accent:#A05A19;--accent-soft:rgba(160,90,25,.09);--accent-2:#3E6478;
  --header-bg:rgba(242,243,241,.88);--shadow:0 10px 30px rgba(30,40,50,.08);
  --law-num:rgba(160,90,25,.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
html,body{overflow-x:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
::selection{background:var(--accent-soft);}
a{color:inherit;text-decoration:none;}

/* spine */
.spine{position:fixed;left:34px;top:0;bottom:0;width:1px;background:var(--line-soft);z-index:0;pointer-events:none;}
@media(max-width:1180px){.spine{display:none;}}

/* header */
header{position:sticky;top:0;z-index:50;background:var(--header-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft);}
.header-in{max-width:var(--maxw);margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;gap:24px;}
.logo{display:flex;align-items:center;gap:11px;}
.logo-mark{width:14px;height:26px;position:relative;flex:none;}
.logo-mark::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:1.5px;background:var(--text);transform:translateX(-50%);}
.logo-mark::after{content:"";position:absolute;left:50%;top:5px;width:7px;height:7px;border-radius:50%;background:var(--accent);transform:translateX(calc(-50% + 4px));}
.logo-word{font-weight:600;letter-spacing:.22em;font-size:14px;}
.logo-sep{color:var(--line);margin:0 2px;font-family:var(--font-mono);}
.logo-page{font-family:var(--font-mono);font-size:13px;color:var(--muted);}
nav.main{display:flex;gap:20px;margin-left:auto;}
nav.main a{font-size:13.5px;color:var(--muted);transition:color .2s;}
nav.main a:hover{color:var(--text);}
nav.main a.active{color:var(--accent);}
.controls{display:flex;align-items:center;gap:10px;margin-left:16px;}
.lang{display:flex;flex-wrap:wrap;border:1px solid var(--line);border-radius:7px;overflow:hidden;max-width:300px;}
.lang button{font-family:var(--font-mono);font-size:13px;padding:5px 8px;border:none;cursor:pointer;background:transparent;color:var(--muted);transition:.2s;flex:1 1 auto;min-width:30px;}
.lang button.on{background:var(--accent-soft);color:var(--accent);font-weight:500;}
.theme-btn{width:34px;height:32px;border:1px solid var(--line);border-radius:7px;cursor:pointer;background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:.2s;flex:none;}
.theme-btn:hover{color:var(--text);border-color:var(--muted);}
@media(max-width:980px){nav.main{display:none;}.controls{margin-left:auto;}}

/* layout */
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;position:relative;z-index:1;}

/* page hero */
.page-hero{padding:80px 0 72px;border-bottom:1px solid var(--line-soft);}
.breadcrumb{font-family:var(--font-mono);font-size:12.5px;color:var(--muted);letter-spacing:.1em;display:flex;align-items:center;gap:8px;margin-bottom:28px;}
.breadcrumb a{color:var(--muted);transition:color .2s;}
.breadcrumb a:hover{color:var(--accent);}
.breadcrumb span{color:var(--line);}
.page-hero h1{font-family:var(--font-display);font-weight:400;font-size:clamp(34px,5vw,54px);letter-spacing:-.015em;line-height:1.1;margin-bottom:24px;}
.page-hero h1 em{font-style:italic;color:var(--accent);}
.page-hero .lead{font-size:17.5px;color:var(--text-soft);max-width:680px;margin-bottom:32px;}
.chain{display:flex;align-items:center;gap:0;flex-wrap:wrap;}
.chain-node{font-family:var(--font-mono);font-size:13px;color:var(--muted);padding:9px 16px;border:1px solid var(--line-soft);border-radius:8px;background:var(--surface);}
.chain-node.root{color:var(--accent);border-color:var(--accent-soft);background:var(--accent-soft);}
.chain-arr{font-family:var(--font-mono);font-size:13px;color:var(--line);padding:0 10px;}
@media(max-width:600px){.page-hero{padding:52px 0 48px;}.page-hero h1{font-size:clamp(26px,7vw,36px);}.chain{gap:6px;}.chain-arr{padding:0 4px;}}

/* formula */
.formula-block{margin-top:36px;padding:22px 26px;background:var(--surface);border:1px solid var(--line-soft);border-radius:12px;max-width:640px;}
.formula-label{font-family:var(--font-mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.formula-text{font-family:var(--font-display);font-style:italic;font-size:19px;color:var(--text-soft);line-height:1.6;}
.formula-text strong{color:var(--text);font-style:normal;font-weight:500;}

/* section shared */
section{padding:80px 0;border-bottom:1px solid var(--line-soft);}
section:last-of-type{border-bottom:none;}
.eyebrow{font-family:var(--font-mono);font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.eyebrow::before{content:"";width:26px;height:1px;background:var(--accent);}
.section-title{font-family:var(--font-display);font-weight:400;font-size:clamp(26px,3.8vw,38px);letter-spacing:-.01em;margin-bottom:16px;}
.section-lead{font-size:17px;color:var(--text-soft);max-width:700px;margin-bottom:42px;}

/* laws grid */
.laws{display:flex;flex-direction:column;gap:0;}
.law{display:grid;grid-template-columns:80px 1fr;gap:0;border-top:1px solid var(--line-soft);transition:background .2s;}
.law:last-child{border-bottom:1px solid var(--line-soft);}
.law:hover{background:var(--surface);}
.law-num{padding:36px 0 36px 0;display:flex;align-items:flex-start;justify-content:center;}
.law-num-inner{
  font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--accent);
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--accent-soft);border-radius:50%;background:var(--law-num);
  flex:none;margin-top:4px;
}
.law-body{padding:36px 36px 36px 0;}
.law-name{font-family:var(--font-display);font-weight:500;font-size:21px;margin-bottom:12px;color:var(--text);}
.law-text{font-size:15px;color:var(--text-soft);line-height:1.75;max-width:680px;}
.law-text p{margin-bottom:10px;}
.law-text p:last-child{margin-bottom:0;}
.law-tag{font-family:var(--font-mono);font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-2);background:rgba(134,169,189,.10);border:1px solid rgba(134,169,189,.18);border-radius:4px;padding:3px 8px;display:inline-block;margin-top:14px;}
html[data-theme="light"] .law-tag{background:rgba(62,100,120,.08);border-color:rgba(62,100,120,.18);}
@media(max-width:760px){
  .law{grid-template-columns:56px 1fr;}
  .law-num{padding:28px 0;}
  .law-num-inner{width:34px;height:34px;font-size:10.5px;}
  .law-body{padding:28px 16px 28px 0;}
  .law-name{font-size:18px;}
}
@media(max-width:600px){
  .law{grid-template-columns:1fr;}
  .law-num{padding:24px 0 0 0;justify-content:flex-start;}
  .law-body{padding:12px 0 28px;}
}

/* axioms */
.axioms{display:grid;grid-template-columns:1fr;gap:0;margin-top:0;}
.axiom{padding:44px 0;border-top:1px solid var(--line-soft);display:grid;grid-template-columns:180px 1fr;gap:32px;align-items:start;}
.axiom:last-child{border-bottom:1px solid var(--line-soft);}
.axiom-label-col{padding-top:6px;}
.axiom-label{font-family:var(--font-mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
.axiom-num{font-family:var(--font-display);font-size:72px;line-height:1;color:var(--line-soft);margin-top:4px;letter-spacing:-.04em;font-weight:300;}
.axiom-body{}
.axiom-text{font-family:var(--font-display);font-size:clamp(20px,2.8vw,27px);line-height:1.35;color:var(--text);font-weight:400;margin-bottom:16px;}
.axiom-text em{font-style:italic;color:var(--accent);}
.axiom-note{font-size:14.5px;color:var(--muted);max-width:580px;line-height:1.7;}
@media(max-width:760px){
  .axiom{grid-template-columns:1fr;}
  .axiom-num{font-size:48px;}
  .axiom-text{font-size:clamp(18px,4.5vw,22px);}
}

/* deformation statement */
.deformation{
  margin-top:56px;padding:36px 40px;
  background:var(--surface);border:1px solid var(--line-soft);border-radius:16px;
  border-left:3px solid var(--accent);
}
.deformation-label{font-family:var(--font-mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:16px;}
.deformation-text{font-family:var(--font-display);font-size:clamp(18px,2.5vw,24px);font-style:italic;line-height:1.5;color:var(--text-soft);}
.deformation-text strong{font-style:normal;color:var(--text);font-weight:500;}
@media(max-width:600px){.deformation{padding:24px 20px;}}

/* cascade visual */
.cascade{display:flex;flex-direction:column;gap:0;margin-top:42px;max-width:560px;}
.cascade-item{display:flex;gap:16px;align-items:flex-start;}
.cascade-line{display:flex;flex-direction:column;align-items:center;flex:none;width:32px;}
.cascade-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex:none;margin-top:5px;}
.cascade-connector{width:1px;flex:1;min-height:28px;background:var(--line-soft);}
.cascade-item:last-child .cascade-connector{display:none;}
.cascade-text{font-size:14.5px;color:var(--text-soft);padding-bottom:20px;line-height:1.55;}
.cascade-text strong{color:var(--text);font-weight:600;font-size:15px;}

/* note */
.note{padding:16px 20px;border-left:2px solid var(--accent);background:var(--accent-soft);border-radius:0 8px 8px 0;font-size:14px;color:var(--text-soft);margin-top:32px;max-width:700px;}
.note b{color:var(--text);font-weight:600;}

/* cta strip */
.cta-strip{padding:72px 0;background:var(--bg-soft);}
.cta-inner{display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap;}
.cta-copy h2{font-family:var(--font-display);font-weight:400;font-size:clamp(24px,3.5vw,34px);margin-bottom:10px;}
.cta-copy p{font-size:16px;color:var(--text-soft);max-width:520px;}
.btn{display:inline-flex;align-items:center;gap:9px;border-radius:9px;font-size:15px;font-weight:500;padding:13px 24px;transition:.22s;cursor:pointer;border:1px solid transparent;}
.btn-primary{background:var(--accent);color:#14110C;}
html[data-theme="light"] .btn-primary{color:#FFF8F0;}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px);}
.btn-ghost{border-color:var(--line);color:var(--text-soft);}
.btn-ghost:hover{border-color:var(--muted);color:var(--text);}

/* footer */
footer{border-top:1px solid var(--line-soft);padding:44px 0 52px;background:var(--bg-soft);}
.foot-grid{display:flex;justify-content:space-between;gap:30px;flex-wrap:wrap;align-items:flex-start;}
.foot-left p{font-size:14px;color:var(--muted);}
.foot-left p:first-child{color:var(--text-soft);font-weight:500;margin-bottom:4px;}
.foot-right{font-family:var(--font-mono);font-size:12.5px;color:var(--muted);text-align:right;line-height:2.2;}
.foot-email a{color:var(--muted);transition:color .2s;}
.foot-email a:hover{color:var(--text);}
@media(max-width:680px){.foot-right{text-align:left;}}

/* reveal */
.reveal{opacity:0;transform:translateY(14px);transition:opacity .65s ease,transform .65s ease;}
.reveal.in{opacity:1;transform:none;}
@media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none;}html{scroll-behavior:auto;}}

/* mobile */
html,body{overflow-x:hidden;}
@media(max-width:600px){
  section{padding:52px 0;}
  .page-hero{padding:44px 0 40px;}
  .wrap{padding:0 16px;}
  .header-in{gap:8px;height:56px;}
  .controls{margin-left:auto;gap:6px;}
  .lang{max-width:calc(100vw - 156px);flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;}
  .lang::-webkit-scrollbar{display:none;}
  .lang button{padding:4px 6px;font-size:11.5px;white-space:nowrap;flex:none;}
  .theme-btn{width:30px;height:28px;}
}
@media(max-width:480px){.lang button{padding:4px 5px;font-size:11px;}}

:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px;}

/* ── header ─────────────────────────────────────────────── */
header{position:sticky;top:0;z-index:50;background:var(--header-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft);}
.header-in{max-width:var(--maxw);margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;gap:20px;}
.logo{display:flex;align-items:center;gap:11px;text-decoration:none;flex:none;}
.logo-mark{width:14px;height:26px;position:relative;flex:none;}
.logo-mark::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:1.5px;background:var(--text);transform:translateX(-50%);}
.logo-mark::after{content:"";position:absolute;left:50%;top:5px;width:7px;height:7px;border-radius:50%;background:var(--accent);transform:translateX(calc(-50% + 4px));}
.logo-word{font-weight:600;letter-spacing:.22em;font-size:14px;}

/* desktop nav — 8 items, compact */
nav.main{display:flex;align-items:center;gap:2px;margin-left:auto;overflow:hidden;}
nav.main a{
  font-size:12px;color:var(--muted);text-decoration:none;
  padding:5px 8px;border-radius:6px;white-space:nowrap;
  transition:color .18s,background .18s;letter-spacing:.01em;
}
nav.main a:hover{color:var(--text);background:var(--surface);}
nav.main a.active{color:var(--accent);}
nav.main a.nav-term{
  font-family:var(--font-mono);font-size:11px;color:var(--accent);
  border:1px solid var(--accent-soft);border-radius:5px;
  padding:4px 7px;letter-spacing:.04em;
}
nav.main a.nav-term:hover{background:var(--accent-soft);}

/* controls */
.controls{display:flex;align-items:center;gap:8px;flex:none;margin-left:12px;}
.lang{display:flex;flex-wrap:wrap;border:1px solid var(--line);border-radius:7px;overflow:hidden;}
.lang button{font-family:var(--font-mono);font-size:12px;padding:4px 7px;border:none;cursor:pointer;background:transparent;color:var(--muted);transition:.18s;flex:1 1 auto;min-width:28px;white-space:nowrap;}
.lang button.on{background:var(--accent-soft);color:var(--accent);font-weight:500;}
.theme-btn{width:32px;height:30px;border:1px solid var(--line);border-radius:7px;cursor:pointer;background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:.18s;flex:none;}
.theme-btn:hover{color:var(--text);border-color:var(--muted);}
.burger-btn{display:none;width:32px;height:30px;border:1px solid var(--line);border-radius:7px;cursor:pointer;background:transparent;color:var(--muted);align-items:center;justify-content:center;flex:none;transition:.18s;}
.burger-btn:hover{color:var(--text);}

/* ── mobile drawer ───────────────────────────────────────── */
.drawer-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:80;opacity:0;transition:opacity .25s;
}
.drawer-overlay.open{display:block;opacity:1;}
.mobile-drawer{
  position:fixed;top:0;right:0;bottom:0;width:min(300px,85vw);
  background:var(--surface);border-left:1px solid var(--line-soft);
  z-index:90;transform:translateX(100%);transition:transform .28s ease;
  display:flex;flex-direction:column;overflow-y:auto;
}
.mobile-drawer.open{transform:translateX(0);}
html[dir="rtl"] .mobile-drawer{right:auto;left:0;border-left:none;border-right:1px solid var(--line-soft);transform:translateX(-100%);}
html[dir="rtl"] .mobile-drawer.open{transform:translateX(0);}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 16px;border-bottom:1px solid var(--line-soft);}
.drawer-title{font-weight:600;letter-spacing:.18em;font-size:13px;}
.drawer-header button{background:transparent;border:none;cursor:pointer;color:var(--muted);padding:4px;border-radius:5px;display:flex;align-items:center;justify-content:center;}
.drawer-header button:hover{color:var(--text);}
.drawer-links{display:flex;flex-direction:column;padding:12px 8px;flex:1;}
.drawer-links a{
  font-size:15px;color:var(--text-soft);text-decoration:none;
  padding:13px 14px;border-radius:8px;transition:background .18s,color .18s;
}
.drawer-links a:hover{background:var(--surface-2);color:var(--text);}
.drawer-links a.nav-term{font-family:var(--font-mono);color:var(--accent);font-size:13px;letter-spacing:.06em;}
.drawer-links a.active{color:var(--accent);}
.drawer-lang{padding:16px;border-top:1px solid var(--line-soft);display:flex;flex-wrap:wrap;gap:4px;}
.drawer-lang button{font-family:var(--font-mono);font-size:12px;padding:5px 9px;border:1px solid var(--line);border-radius:5px;cursor:pointer;background:transparent;color:var(--muted);transition:.18s;}
.drawer-lang button.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-soft);}

/* ── responsive breakpoints ──────────────────────────────── */
/* 1180px: hide last 2 items */
@media(max-width:1180px){
  nav.main a[href="atlas.html"],
  nav.main a[href="anthroponomy.html"]{display:none;}
}
/* 980px: hide all nav items, show burger */
@media(max-width:980px){
  nav.main{display:none;}
  .burger-btn{display:flex;}
  .controls{margin-left:auto;}
  .lang{max-width:calc(100vw - 156px);flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;}
  .lang::-webkit-scrollbar{display:none;}
  .lang button{padding:4px 6px;font-size:11.5px;white-space:nowrap;flex:none;}
}
@media(max-width:600px){
  .header-in{padding:0 16px;height:56px;gap:8px;}
  .lang{max-width:calc(100vw - 120px);}
  .lang button{padding:3px 5px;font-size:11px;}
  .theme-btn,.burger-btn{width:30px;height:28px;}
}

</style>
</head>
<body>
<div class="spine" aria-hidden="true"></div>


<header>
  <div class="header-in">
    <a class="logo" href="index.html" aria-label="PRIMORDIS home">
      <span class="logo-mark" aria-hidden="true"></span>
      <span class="logo-word">PRIMORDIS</span>
    </a>
    <nav class="main" id="mainNav" aria-label="Main navigation">
      <a href="index.html"         data-i18n="nav_home"></a>
      <a href="framework.html"     data-i18n="nav_framework" class="active"></a>
      <a href="assessment.html"    data-i18n="nav_assessment"></a>
      <a href="cases.html"         data-i18n="nav_cases"></a>
      <a href="research.html"      data-i18n="nav_research"></a>
      <a href="primordocciput.html" class="nav-term" data-i18n="nav_primordocciput"></a>
      <a href="atlas.html"         data-i18n="nav_atlas"></a>
      <a href="anthroponomy.html"  data-i18n="nav_anthroponomy"></a>
    </nav>
    <div class="controls">
      <div class="lang" role="group" aria-label="Language">
        <button type="button" data-lang="en">EN</button>
        <button type="button" data-lang="de">DE</button>
        <button type="button" data-lang="ru">RU</button>
        <button type="button" data-lang="es">ES</button>
        <button type="button" data-lang="fr">FR</button>
        <button type="button" data-lang="ar">AR</button>
        <button type="button" data-lang="zh">中文</button>

  laws_eyebrow:"01 · Законы", laws_title:"Десять законов.", laws_lead:"Каждый закон описывает паттерн, наблюдавшийся в тысячах документированных случаев. Вместе они образуют операциональную логику методологии PRIMORDIS.",
  l1_name:"Закон первичной асимметрии",
  l1_text:"Большинство хронических компенсаций не начинается в месте боли. Сначала возникает первичная потеря симметрии. Затем организм перестраивается вокруг неё. Симптом появляется последним — часто далеко от источника.",

  l2_name:"Закон вертикали",

  l4_name:"Закон экономии организма",

  l5_text:"Многие мышцы расслабляются не после лечения мышцы. Они расслабляются после устранения причины их напряжения. Это не ремонт. Это отмена приказа. Мышца не выходила из строя — она выполняла команду. Когда приказ отменён, напряжение уходит.",

  l9_name:"Закон структурной энергии",

let currentLang = "en";
let currentTheme = "dark";

(function(){
  const nav = (navigator.language || "en").toLowerCase();
  if(nav.startsWith("ru")||nav.startsWith("uk")||nav.startsWith("kk")||nav.startsWith("ky")||nav.startsWith("uz")) currentLang = "ru";
  else if(nav.startsWith("de")) currentLang = "de";
})();

function applyLang(lang){
  const dict = I18N[lang] || I18N["en"];
  currentLang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k = el.getAttribute("data-i18n");
    if(dict[k] !== undefined) el.innerHTML = dict[k];
  });
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
  document.querySelectorAll(".lang button").forEach(b=>b.classList.toggle("on", b.dataset.lang === lang));
}

function applyTheme(t){
  currentTheme = t;
  document.documentElement.setAttribute("data-theme", t);
  const icon = document.getElementById("themeIcon");
  icon.innerHTML = t === "dark"
    ? '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>'
    : '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>';
}

document.querySelectorAll(".lang button").forEach(b=>b.addEventListener("click",()=>applyLang(b.dataset.lang)));
document.getElementById("themeBtn").addEventListener("click",()=>applyTheme(currentTheme==="dark"?"light":"dark"));

const io = new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}});
},{threshold:0.06});
document.querySelectorAll(".reveal").forEach(el=>io.observe(el));

applyLang(currentLang);
applyTheme("dark");

// ── mobile drawer ────────────────────────────────────────────────────────────
const burger = document.getElementById('burgerBtn');
const drawer = document.getElementById('mobileDrawer');
const overlay = document.getElementById('drawerOverlay');
const dClose = document.getElementById('drawerClose');

function openDrawer(){
  drawer.classList.add('open');
  overlay.classList.add('open');
  drawer.setAttribute('aria-hidden','false');
  burger.setAttribute('aria-expanded','true');
  document.body.style.overflow='hidden';
}
function closeDrawer(){
  drawer.classList.remove('open');
  overlay.classList.remove('open');
  drawer.setAttribute('aria-hidden','true');
  burger.setAttribute('aria-expanded','false');
  document.body.style.overflow='';
}
burger && burger.addEventListener('click', openDrawer);
dClose && dClose.addEventListener('click', closeDrawer);
overlay && overlay.addEventListener('click', closeDrawer);
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeDrawer(); });

// drawer links close drawer on tap
document.querySelectorAll('.drawer-links a').forEach(a=>{
  a.addEventListener('click', closeDrawer);
});

// drawer lang buttons mirror main lang buttons
document.querySelectorAll('.drawer-lang button').forEach(b=>{
  b.addEventListener('click', ()=>{
    applyLang(b.dataset.lang);
    // sync drawer lang button states
    document.querySelectorAll('.drawer-lang button').forEach(x=>x.classList.toggle('on', x.dataset.lang===b.dataset.lang));
  });
});

</script>
