<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIMORDIS — Human Configuration Navigation</title>
<meta name="description" content="Understanding how configuration influences state, performance and potential realization. A research-driven navigation platform.">
<!--
  PRIMORDIS · Home Architecture v1.0 (FROZEN)
  01 Hero · 02 Human State · 03 Human Configuration · 04 Symptom Explorer
  05 Assessment · 06 Navigation Framework · 07 Research Program
  08 Case Library · 09 FAQ · 10 Start Navigation

  Reserved Cloudflare routes:
  /  /framework  /assessment  /research  /cases  /faq
  /knowledge  /atlas  /primordocciput  /anthroponomy  /start
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --maxw: 1080px;
  --font-display: 'Spectral', Georgia, serif;
  --font-body: 'IBM Plex Sans', -apple-system, 'Segoe UI', sans-serif;
  --font-mono: 'IBM Plex Mono', 'SF Mono', monospace;
}
html[data-theme="dark"]{
  --bg:#101418;
  --bg-soft:#141A20;
  --surface:#1A2129;
  --surface-2:#1F2731;
  --text:#E6EAED;
  --text-soft:#C3CBD2;
  --muted:#8E99A3;
  --line:#2B343E;
  --line-soft:#222B34;
  --accent:#D2904F;
  --accent-soft:rgba(210,144,79,.14);
  --accent-2:#86A9BD;
  --header-bg:rgba(16,20,24,.82);
  --shadow:0 10px 34px rgba(0,0,0,.35);
}
html[data-theme="light"]{
  --bg:#F2F3F1;
  --bg-soft:#ECEEEC;
  --surface:#FAFBFA;
  --surface-2:#FFFFFF;
  --text:#21262B;
  --text-soft:#3A434B;
  --muted:#5C6770;
  --line:#D7DCDE;
  --line-soft:#E2E6E7;
  --accent:#A05A19;
  --accent-soft:rgba(160,90,25,.10);
  --accent-2:#3E6478;
  --header-bg:rgba(242,243,241,.85);
  --shadow:0 10px 30px rgba(30,40,50,.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  font-size:16px;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
  transition:background .35s ease, color .35s ease;
}
::selection{background:var(--accent-soft);}
a{color:inherit;}
img,svg{display:block;max-width:100%;}

/* ---------- structural spine (decor) ---------- */
.spine{position:fixed;left:34px;top:0;bottom:0;width:1px;background:var(--line-soft);z-index:0;}
@media(max-width:1180px){.spine{display:none;}}

/* ---------- header ---------- */
header{
  position:sticky;top:0;z-index:50;
  background:var(--header-bg);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line-soft);
}
.header-in{
  max-width:var(--maxw);margin:0 auto;padding:0 24px;
  height:64px;display:flex;align-items:center;gap:28px;
}
.logo{display:flex;align-items:center;gap:11px;text-decoration:none;}
.logo-mark{width:14px;height:26px;position:relative;flex:none;}
.logo-mark::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:1.5px;background:var(--text);transform:translateX(-50%);}
.logo-mark::after{content:"";position:absolute;left:50%;top:5px;width:7px;height:7px;border-radius:50%;background:var(--accent);transform:translateX(calc(-50% + 4px));}
.logo-word{font-family:var(--font-body);font-weight:600;letter-spacing:.22em;font-size:14px;}
nav.main{display:flex;gap:22px;margin-left:auto;}
nav.main a{font-size:13.5px;color:var(--muted);text-decoration:none;transition:color .2s;}
nav.main a:hover{color:var(--text);}
.controls{display:flex;align-items:center;gap:10px;margin-left:18px;}
.lang{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;}
.lang button{
  font-family:var(--font-mono);font-size:13px;padding:5px 9px;border:none;cursor:pointer;
  background:transparent;color:var(--muted);transition:.2s;
}
.lang button.on{background:var(--accent-soft);color:var(--accent);font-weight:500;}
.theme-btn{
  width:34px;height:32px;border:1px solid var(--line);border-radius:7px;cursor:pointer;
  background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:.2s;
}
.theme-btn:hover{color:var(--text);border-color:var(--muted);}
@media(max-width:980px){nav.main{display:none;}.controls{margin-left:auto;}}

/* ---------- shared ---------- */
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;position:relative;z-index:1;}
section{padding:92px 0;border-bottom:1px solid var(--line-soft);}
section:last-of-type{border-bottom:none;}
.eyebrow{
  font-family:var(--font-mono);font-size:13px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--accent);display:flex;align-items:center;gap:12px;margin-bottom:18px;
}
.eyebrow::before{content:"";width:26px;height:1px;background:var(--accent);}
h1,h2,h3{font-family:var(--font-display);font-weight:400;line-height:1.18;}
h2{font-size:clamp(28px,4vw,40px);margin-bottom:18px;letter-spacing:-.01em;}
.lead{font-size:17.5px;color:var(--text-soft);max-width:700px;}
.note{
  margin-top:30px;padding:16px 20px;border-left:2px solid var(--accent);
  background:var(--accent-soft);border-radius:0 8px 8px 0;
  font-size:14px;color:var(--text-soft);max-width:700px;
}
.note b{color:var(--text);font-weight:600;}
.grid{display:grid;gap:18px;margin-top:42px;}
.g3{grid-template-columns:repeat(3,1fr);}
.g4{grid-template-columns:repeat(2,1fr);}
@media(max-width:860px){.g3{grid-template-columns:1fr;}.g4{grid-template-columns:1fr;}}
.card{
  background:var(--surface);border:1px solid var(--line-soft);border-radius:12px;
  padding:26px 24px;transition:border-color .25s, transform .25s;
}
.card:hover{border-color:var(--line);transform:translateY(-2px);}
.card h3{font-family:var(--font-body);font-weight:600;font-size:16px;margin-bottom:10px;}
.card p{font-size:14.5px;color:var(--muted);line-height:1.6;}
.card .tag{
  font-family:var(--font-mono);font-size:12.5px;color:var(--accent);
  display:block;margin-bottom:12px;letter-spacing:.08em;
}
.close-line{
  margin-top:38px;font-family:var(--font-display);font-style:italic;
  font-size:20px;color:var(--text-soft);max-width:640px;
}
.tools-line{
  margin-top:24px;font-family:var(--font-mono);font-size:13px;color:var(--muted);
  display:flex;align-items:center;gap:10px;max-width:700px;
}
.tools-line::before{content:"▸";color:var(--accent);}

/* ---------- hero ---------- */
.hero{padding:96px 0 100px;border-bottom:1px solid var(--line-soft);}
.hero-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:64px;align-items:center;}
@media(max-width:920px){.hero-grid{grid-template-columns:1fr;gap:48px;}}
.hero h1{font-size:clamp(36px,5.2vw,56px);letter-spacing:-.015em;margin:0 0 22px;}
.hero h1 em{font-style:italic;color:var(--accent);}
.hero .sub{font-size:18px;color:var(--text-soft);max-width:560px;margin-bottom:34px;}
.cta-row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
.btn{
  display:inline-flex;align-items:center;gap:9px;text-decoration:none;border-radius:9px;
  font-size:15px;font-weight:500;padding:13px 24px;transition:.22s;cursor:pointer;border:1px solid transparent;
}
.btn-primary{background:var(--accent);color:#14110C;}
html[data-theme="light"] .btn-primary{color:#FFF8F0;}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px);}
.btn-ghost{border-color:var(--line);color:var(--text-soft);}
.btn-ghost:hover{border-color:var(--muted);color:var(--text);}
.hero-note{margin-top:26px;font-family:var(--font-mono);font-size:13px;color:var(--muted);letter-spacing:.02em;}
.principle{
  margin-top:34px;padding-top:24px;border-top:1px solid var(--line-soft);max-width:560px;
}
.principle .p-label{
  font-family:var(--font-mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;
}
.principle .p-text{
  font-family:var(--font-display);font-style:italic;font-size:21px;color:var(--text-soft);
}
.fig{position:relative;}
.fig-caption{margin-top:14px;font-family:var(--font-mono);font-size:12.5px;color:var(--muted);text-align:center;}
.axis-svg .ref{stroke:var(--text-soft);stroke-width:1.4;}
.axis-svg .tick{stroke:var(--line);stroke-width:1;}
.axis-svg .node{fill:var(--accent);}
.axis-svg .node-ring{fill:none;stroke:var(--accent);stroke-width:1;opacity:.45;}
.axis-svg .arrow-head{fill:var(--muted);}
.axis-svg text{font-family:var(--font-mono);font-size:11.5px;fill:var(--muted);}
.axis-svg .lbl{fill:var(--text);font-size:13.5px;font-weight:500;letter-spacing:.1em;}
.axis-svg .stage{opacity:0;}
@media(prefers-reduced-motion:no-preference){
  .axis-svg .ref{stroke-dasharray:520;stroke-dashoffset:520;animation:draw 1.5s ease forwards .2s;}
  .axis-svg .stage1{animation:fadein .7s ease forwards .6s;}
  .axis-svg .stage2{animation:fadein .7s ease forwards 1.1s;}
  .axis-svg .stage3{animation:fadein .7s ease forwards 1.6s;}
  @keyframes draw{to{stroke-dashoffset:0;}}
  @keyframes fadein{to{opacity:1;}}
}
@media(prefers-reduced-motion:reduce){.axis-svg .stage{opacity:1;}}

/* ---------- chips (state) ---------- */
.chips{display:flex;flex-wrap:wrap;gap:12px;margin-top:36px;max-width:700px;}
.chip{
  font-family:var(--font-mono);font-size:13.5px;color:var(--text-soft);
  border:1px solid var(--line);border-radius:999px;padding:9px 18px;background:var(--surface);
}

/* ---------- schema panel (case library) ---------- */
.map-panel{
  margin-top:42px;background:var(--surface);border:1px solid var(--line-soft);
  border-radius:14px;overflow:hidden;box-shadow:var(--shadow);
}
.map-row{display:grid;grid-template-columns:230px 1fr;border-bottom:1px solid var(--line-soft);}
.map-row:last-child{border-bottom:none;}
.map-key{
  font-family:var(--font-mono);font-size:13px;color:var(--accent);padding:22px 24px;
  border-right:1px solid var(--line-soft);display:flex;align-items:center;gap:10px;letter-spacing:.04em;
}
.map-key .k{color:var(--muted);}
.map-val{padding:22px 24px;font-size:14.5px;color:var(--text-soft);}
@media(max-width:680px){.map-row{grid-template-columns:1fr;}.map-key{border-right:none;padding-bottom:4px;}.map-val{padding-top:6px;}}

/* ---------- FAQ ---------- */
.faq{max-width:760px;margin-top:36px;}
details{border-bottom:1px solid var(--line-soft);}
details summary{
  list-style:none;cursor:pointer;padding:22px 36px 22px 0;position:relative;
  font-family:var(--font-display);font-size:19px;transition:color .2s;
}
details summary::-webkit-details-marker{display:none;}
details summary::after{
  content:"+";position:absolute;right:4px;top:50%;transform:translateY(-50%);
  font-family:var(--font-mono);color:var(--accent);font-size:19px;transition:transform .25s;
}
details[open] summary::after{transform:translateY(-50%) rotate(45deg);}
details .a{padding:0 0 24px;font-size:15px;color:var(--text-soft);max-width:680px;line-height:1.7;}

/* ---------- navigation cycle ---------- */
.cycle{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:40px;}
.step{
  display:flex;align-items:center;gap:10px;background:var(--surface);
  border:1px solid var(--line-soft);border-radius:10px;padding:13px 18px;
}
.step .num{font-family:var(--font-mono);font-size:12.5px;color:var(--accent);}
.step .name{font-size:14.5px;font-weight:500;}
.arrow{color:var(--muted);font-family:var(--font-mono);font-size:14px;}
.cycle-back{
  width:100%;margin-top:6px;font-family:var(--font-mono);font-size:12.5px;color:var(--muted);
  display:flex;align-items:center;gap:10px;
}
.cycle-back::before{content:"↺";color:var(--accent);font-size:15px;}

/* ---------- start ---------- */
.final-cta{margin-top:46px;display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
.final-note{font-family:var(--font-display);font-style:italic;font-size:17px;color:var(--muted);}

/* ---------- footer ---------- */
footer{border-top:1px solid var(--line-soft);padding:48px 0 56px;background:var(--bg-soft);}
.foot-grid{display:flex;justify-content:space-between;gap:30px;flex-wrap:wrap;}
.foot-left p{font-size:14px;color:var(--muted);}
.foot-left p:first-child{color:var(--text-soft);font-weight:500;margin-bottom:6px;}
.foot-right{font-family:var(--font-mono);font-size:12.5px;color:var(--muted);text-align:right;line-height:2;}
@media(max-width:680px){.foot-right{text-align:left;}}

/* ---------- reveal ---------- */
.reveal{opacity:0;transform:translateY(16px);transition:opacity .7s ease, transform .7s ease;}
.reveal.in{opacity:1;transform:none;}
@media(prefers-reduced-motion:reduce){
  .reveal{opacity:1;transform:none;transition:none;}
  html{scroll-behavior:auto;}
}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px;}

/* ---------- RTL (Arabic) ---------- */
html[dir="rtl"] .eyebrow::before{margin-right:0;margin-left:0;order:1;}
html[dir="rtl"] .eyebrow{flex-direction:row-reverse;}
html[dir="rtl"] .map-key{border-right:none;border-left:1px solid var(--line-soft);}
html[dir="rtl"] .note{border-left:none;border-right:2px solid var(--accent);border-radius:8px 0 0 8px;}
html[dir="rtl"] .tools-line::before{content:"◂";}
html[dir="rtl"] .cycle-back::before{content:"↻";}
html[dir="rtl"] .spine{left:auto;right:34px;}
html[dir="rtl"] nav.main{margin-left:0;margin-right:auto;}

/* ---------- lang strip — 9 buttons ---------- */
.lang{display:flex;flex-wrap:wrap;border:1px solid var(--line);border-radius:7px;overflow:hidden;max-width:320px;}
.lang button{flex:1 1 auto;min-width:32px;}

/* ---------- mobile ---------- */
@media(max-width:600px){
  section{padding:60px 0;}
  .hero{padding:60px 0 68px;}
  .wrap{padding:0 16px;}
  .header-in{gap:10px;height:58px;}
  nav.main{display:none;}
  .controls{margin-left:auto;gap:6px;}
  .lang{
    max-width:calc(100vw - 160px);
    flex-wrap:nowrap;overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .lang::-webkit-scrollbar{display:none;}
  .lang button{padding:4px 7px;font-size:11.5px;white-space:nowrap;flex:none;}
  .theme-btn{width:30px;height:28px;}
  .hero h1{font-size:clamp(28px,7.5vw,38px);}
  .hero .sub{font-size:16px;}
  .hero-grid{gap:36px;}
  h2{font-size:clamp(22px,6vw,30px);}
  .lead{font-size:16px;}
  .g3{grid-template-columns:1fr;}
  .g4{grid-template-columns:1fr;}
  .map-row{grid-template-columns:1fr;}
  .map-key{border-right:none;padding-bottom:4px;}
  .map-val{padding-top:6px;}
  .cycle{gap:8px;}
  .step{padding:10px 14px;}
  .dims{flex-direction:column;}
  .dim{border-right:none;border-bottom:1px solid var(--line-soft);}
  .dim:last-child{border-bottom:none;}
  .axis-svg{max-height:420px;}
}
@media(max-width:480px){
  .lang button{padding:4px 5px;font-size:11px;}
  .logo-word{font-size:12.5px;}
}
</style>
</head>
<body>
<div class="spine" aria-hidden="true"></div>

<header>
  <div class="header-in">
    <a class="logo" href="#top" aria-label="PRIMORDIS — home">
      <span class="logo-mark" aria-hidden="true"></span>
      <span class="logo-word">PRIMORDIS</span>
    </a>
    <nav class="main" aria-label="Main">
      <a href="#top" data-i18n="nav_home"></a>
      <a href="#framework" data-i18n="nav_framework"></a>
      <a href="#assessment" data-i18n="nav_assessment"></a>
      <a href="#research" data-i18n="nav_research"></a>
      <a href="#cases" data-i18n="nav_cases"></a>
      <a href="#faq" data-i18n="nav_faq"></a>
    </nav>
    <div class="controls">
      <div class="lang" role="group" aria-label="Language">
        <button type="button" data-lang="en">EN</button>
        <button type="button" data-lang="de">DE</button>
        <button type="button" data-lang="ru">RU</button>
        <button type="button" data-lang="es">ES</button>
        <button type="button" data-lang="fr">FR</button>
        <button type="button" data-lang="ar">AR</button>
        <button type="button" data-lang="zh">中文</button>
        <button type="button" data-lang="ja">日本語</button>
        <button type="button" data-lang="ko">한국어</button>
      </div>
      <button type="button" class="theme-btn" id="themeBtn" aria-label="Toggle theme">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" id="themeIcon">
          <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<main id="top">

<!-- 01 · HERO -->
<div class="hero">
  <div class="wrap hero-grid">
    <div>
      <div class="eyebrow" data-i18n="hero_eyebrow"></div>
      <h1 data-i18n="hero_title"></h1>
      <p class="sub" data-i18n="hero_sub"></p>
      <div class="cta-row">
        <a class="btn btn-primary" href="#start" data-i18n="hero_cta1"></a>
        <a class="btn btn-ghost" href="#state" data-i18n="hero_cta2"></a>
      </div>
      <p class="hero-note" data-i18n="hero_note"></p>
      <div class="principle">
        <div class="p-label" data-i18n="hero_principle_label"></div>
        <div class="p-text" data-i18n="hero_principle"></div>
      </div>
    </div>
    <div class="fig">
      <svg class="axis-svg" viewBox="0 0 340 540" role="img" aria-label="Schematic: state emerges from configuration; configuration is changed through navigation">
        <!-- ruler ticks -->
        <g>
          <line class="tick" x1="92" y1="60"  x2="100" y2="60"/>
          <line class="tick" x1="92" y1="110" x2="100" y2="110"/>
          <line class="tick" x1="92" y1="160" x2="100" y2="160"/>
          <line class="tick" x1="92" y1="210" x2="100" y2="210"/>
          <line class="tick" x1="92" y1="260" x2="100" y2="260"/>
          <line class="tick" x1="92" y1="310" x2="100" y2="310"/>
          <line class="tick" x1="92" y1="360" x2="100" y2="360"/>
          <line class="tick" x1="92" y1="410" x2="100" y2="410"/>
          <line class="tick" x1="92" y1="460" x2="100" y2="460"/>
        </g>
        <!-- vertical reference axis -->
        <line class="ref" x1="100" y1="36" x2="100" y2="510"/>
        <!-- arrowheads on axis between nodes -->
        <polygon class="arrow-head stage stage2" points="96,180 104,180 100,190"/>
        <polygon class="arrow-head stage stage3" points="96,345 104,345 100,355"/>
        <!-- STATE node -->
        <g class="stage stage1">
          <circle class="node-ring" cx="100" cy="105" r="13"/>
          <circle class="node" cx="100" cy="105" r="5"/>
          <text class="lbl" x="128" y="101" data-i18n="ax_s1"></text>
          <text x="128" y="118" data-i18n="ax_s1b"></text>
        </g>
        <!-- CONFIGURATION node -->
        <g class="stage stage2">
          <circle class="node-ring" cx="100" cy="270" r="13"/>
          <circle class="node" cx="100" cy="270" r="5"/>
          <text class="lbl" x="128" y="266" data-i18n="ax_s2"></text>
          <text x="128" y="283" data-i18n="ax_s2b"></text>
        </g>
        <!-- NAVIGATION node -->
        <g class="stage stage3">
          <circle class="node-ring" cx="100" cy="435" r="13"/>
          <circle class="node" cx="100" cy="435" r="5"/>
          <text class="lbl" x="128" y="431" data-i18n="ax_s3"></text>
          <text x="128" y="448" data-i18n="ax_s3b"></text>
        </g>
      </svg>
      <p class="fig-caption" data-i18n="hero_fig"></p>
    </div>
  </div>
</div>

<!-- 02 · HUMAN STATE -->
<section id="state">
  <div class="wrap reveal">
    <div class="eyebrow" data-i18n="s2_eyebrow"></div>
    <h2 data-i18n="s2_title"></h2>
    <p class="lead" data-i18n="s2_lead"></p>
    <div class="chips">
      <span class="chip" data-i18n="s2_ch1"></span>
      <span class="chip" data-i18n="s2_ch2"></span>
      <span class="chip" data-i18n="s2_ch3"></span>
      <span class="chip" data-i18n="s2_ch4"></span>
      <span class="chip" data-i18n="s2_ch5"></span>

  s7_lead:"PRIMORDIS ist als offenes Forschungsprogramm aufgebaut. Seine Aussagen sind so organisiert, dass sie geprüft — und, wo falsch, korrigiert — werden können.",
  s7_r1tag:"empirische Basis", s7_r1t:"Beobachtungen", s7_r1b:"3.500+ dokumentierte klinische Beobachtungen bilden die empirische Basis: strukturierte Fälle mit Zeitverläufen und Katamnese.",
  s7_r2tag:"in Untersuchung", s7_r2t:"Hypothesen", s7_r2b:"Die zentrale Hypothese — Primordocciput — postuliert einen primären Verschiebungspunkt am kraniozervikalen Übergang (C0), von dem systemische Asymmetrie ausgehen könnte. Sie ist als Hypothese formuliert, nicht als Tatsache.",
  s7_r3tag:"Prüfbarkeit", s7_r3t:"Falsifikationskriterien", s7_r3b:"Jede Kernaussage ist mit Bedingungen verknüpft, unter denen sie als widerlegt gälte.",
  s7_r4tag:"Grenzbereich", s7_r4t:"Offene Fragen", s7_r4b:"Mechanismen, Dauerhaftigkeit von Veränderungen, Variabilität in der Population und die Grenzen des Frameworks bleiben offen.",
  s7_note:"<b>Konstruktionsanforderung:</b> Beobachtungen und Hypothesen werden stets als solche gekennzeichnet. Wissenschaftliche Bescheidenheit ist in diese Plattform eingebaut.",

  s8_eyebrow:"07 · Fallbibliothek", s8_title:"Die Fallbibliothek.",
  s8_lead:"Eine strukturierte Fallbibliothek dokumentiert Konfigurationen über die Zeit. Jeder Fall wird entlang fünf Dimensionen erfasst — organisiert für Vergleich, nicht für Überzeugung.",
  s8_d1k:"Symptommuster", s8_d1v:"Welche Signale, auf welcher Seite, in welcher Kombination — zu Beginn der Beobachtung.",
  s8_d2k:"Konfigurationsmuster", s8_d2v:"Das strukturelle Bild: Achse, Kompensationen, Lastverteilung.",
  s8_d3k:"Zeitverlauf", s8_d3v:"Interventionshistorie und die Abfolge dokumentierter Beobachtungen.",
  s8_d4k:"Katamnese", s8_d4v:"Was Wochen und Monate später beobachtet wird — ohne Selektion.",
  s8_d5k:"Ergebnisbeobachtung", s8_d5v:"Was sich verändert hat, was nicht — und was offen bleibt.",
  s8_disc:"<b>Hinweis:</b> Fälle sind Beobachtungsaufzeichnungen. Sie illustrieren das Framework; sie beweisen keine Wirksamkeit.",

  s9_eyebrow:"08 · FAQ", s9_title:"Ehrliche Antworten auf faire Fragen.",
  s9_q1:"Ist PRIMORDIS ein medizinischer Dienst?",
  s9_a1:"Nein. PRIMORDIS ist eine forschungsorientierte Navigationsplattform. Sie diagnostiziert und behandelt keine Krankheiten und ersetzt keine medizinische Versorgung. Bei einer medizinischen Erkrankung wenden Sie sich an eine qualifizierte Ärztin oder einen qualifizierten Arzt.",
  s9_q2:"Was ist belegt, was ist Hypothese?",
  s9_a2:"Dokumentierte Beobachtungen — strukturierte Fallaufzeichnungen — bilden die empirische Ebene. Erklärende Aussagen, einschließlich der Primordocciput-Hypothese, sind ausdrücklich als untersuchte Hypothesen gekennzeichnet.",
  s9_q3:"Was umfasst eine Erfassung?",
  s9_a3:"Visuelle und posturale Beobachtung anhand definierter Referenzpunkte, Bewegungsmuster und strukturierte Selbstbeobachtung. Das Ergebnis ist eine Konfigurationskarte, keine Diagnose.",
  s9_q4:"Welche Ergebnisse sind zu erwarten?",
  s9_a4:"Kein Ergebnis wird versprochen. Die Verpflichtung der Plattform ist eine andere: Messung vor Empfehlung, Beobachtung nach jedem Schritt und ehrliche Dokumentation dessen, was sich verändert — und was nicht.",
  s9_q5:"Wie verhält sich PRIMORDIS zur Anthroponomie?",
  s9_a5:"PRIMORDIS ist eine angewandte Methode innerhalb der entstehenden Disziplin der Anthroponomie, die die Kette von struktureller Einschränkung über funktionale Zugänglichkeit zur Potenzialverwirklichung untersucht. Daten und Methoden der Plattform sind so angelegt, dass sie mit diesem größeren Rahmen kompatibel bleiben.",

  s10_eyebrow:"09 · Navigation beginnen", s10_title:"Navigation beginnen.",
  s10_lead:"Der erste Schritt ist eine Erfassung: Ihre Konfiguration wird beobachtet, gemessen und kartiert. Die Route beginnt bei der Karte.",
  s10_cta:"Erfassung anfragen",
  s10_note:"Ihnen wird nichts verkauft. Sie werden gemessen, kartiert — und Ihnen wird Ihre eigene Konfiguration gezeigt.",

  s2_eyebrow:"01 · Состояние человека", s2_title:"Человек чувствует состояние — а не конфигурацию.",
  s2_lead:"Энергия, фокус, ясность, эмоциональная устойчивость, сон, резильентность — состояние и есть то, как жизнь переживается на самом деле. PRIMORDIS начинает там же, где начинаете вы: с состояния. А затем прослеживает его вглубь — к взаимодействующим слоям, из которых оно возникает: структурному, неврологическому, сосудистому, метаболическому, поведенческому.",
  s2_ch1:"Энергия", s2_ch2:"Фокус", s2_ch3:"Ясность", s2_ch4:"Эмоциональная устойчивость", s2_ch5:"Сон", s2_ch6:"Резильентность",
  s2_note:"<b>Эпистемический статус:</b> в документированных наблюдениях изменения конфигурации часто сопровождаются изменениями состояния. Это исследуемая связь — не медицинское утверждение.",

  s3_eyebrow:"02 · Конфигурация человека", s3_title:"Что такое конфигурация человека?",
  s3_lead:"Конфигурация — это сложившаяся система структурных отношений, внутри которой работают все остальные системы: положение кранио-вертебральной оси, распределение нагрузки и цепи компенсаций, которые тело выстраивает, чтобы удерживать глаза горизонтально, а систему — вертикально.",
  s3_l1t:"Структурная ось", s3_l1b:"Вертикальная организация головы, позвоночника и таза — референсная линия всей системы.",
  s3_l2t:"Цепи компенсаций", s3_l2b:"Адаптивные контрсмещения, сохраняющие равновесие ценой асимметричной нагрузки.",
  s3_l3t:"Распределение нагрузки", s3_l3b:"Как вес, напряжение и движение распределяются — или концентрируются — в структуре.",
  s3_l4t:"Адаптивный резерв", s3_l4b:"Оставшаяся способность поглощать новую нагрузку до того, как система начнёт подавать сигналы.",

  s4_eyebrow:"03 · Эксплорер симптомов", s4_title:"Симптомы как координаты.",
  s4_lead:"Симптомы реальны — но это сигналы взаимодействующих слоёв, а не диагнозы. Эксплорер организует их как координаты: какие сигналы, на какой стороне, в каком сочетании, с какого времени. Паттерны возврата, миграции и агрегации часто говорят больше, чем любой отдельный симптом.",
  s4_c1tag:"категория", s4_c1t:"Неврологические", s4_c1b:"Головная боль, головокружение, паттерны напряжения, сенсорный шум.",
  s4_c2tag:"категория", s4_c2t:"Мышечно-скелетные", s4_c2b:"Шея, спина, челюсть, таз — односторонняя нагрузка и дискомфорт.",
  s4_c3tag:"категория", s4_c3t:"Когнитивные", s4_c3b:"Фокус, скорость обработки, ментальная усталость, туман.",
  s4_c4tag:"категория", s4_c4t:"Эмоциональные", s4_c4b:"Устойчивость, раздражительность, фоновое беспокойство.",
  s4_c5tag:"категория", s4_c5t:"Сон", s4_c5b:"Засыпание, поддержание сна, утреннее состояние.",
  s4_c6tag:"категория", s4_c6t:"Продуктивность", s4_c6b:"Выносливость, восстановление, точность, стабильность.",
  s4_close:"Внутри PRIMORDIS симптом никогда не является приговором. Это координата для навигации.",

  s5_eyebrow:"04 · Оценка", s5_title:"Наблюдать. Измерять. Картировать. Приоритизировать.",
  s5_lead:"Навигация начинается с измерения. Ни одна рекомендация не делается до того, как текущая конфигурация наблюдена и описана.",
  s5_a1tag:"шаг 1", s5_a1t:"Наблюдение", s5_a1b:"Структура в положении стоя и движение наблюдаются по заданным референсным точкам и документируются.",
  s5_a2tag:"шаг 2", s5_a2t:"Измерение", s5_a2b:"Поза, паттерны движения и структурированное самонаблюдение превращают впечатления в сопоставимые данные.",
  s5_a3tag:"шаг 3", s5_a3t:"Картирование", s5_a3b:"Результаты собираются в индивидуальную карту конфигурации: отклонение оси, цепи компенсаций — структурированное описание, а не диагноз.",
  s5_a4tag:"шаг 4", s5_a4t:"Приоритизация", s5_a4b:"Карта задаёт последовательность приоритетов: с какого слоя начинать и что наблюдать после каждого шага.",
  s5_tools:"Цифровые инструменты оценки — компьютерное зрение, структурированные опросники — в разработке.",
  s5_note:"<b>Принцип:</b> измерение предшествует рекомендации — всегда.",

  s6_lead:"PRIMORDIS рассматривает изменение как навигируемый цикл, а не разовое событие. Каждое вмешательство встроено между измерением и наблюдением:",
  s6_st1:"Оценка", s6_st2:"Картирование", s6_st3:"Приоритизация", s6_st4:"Вмешательство", s6_st5:"Наблюдение", s6_st6:"Переоценка", s6_st7:"Трекинг стабильности",

  s7_lead:"PRIMORDIS построен как открытая исследовательская программа. Его утверждения организованы так, чтобы их можно было проверить — и, где они ошибочны, исправить.",
  s7_r1tag:"эмпирическая база", s7_r1t:"Наблюдения", s7_r1b:"3 500+ документированных клинических наблюдений составляют эмпирическую базу: структурированные случаи с таймлайнами и катамнезом.",
  s7_r2tag:"в исследовании", s7_r2t:"Гипотезы", s7_r2b:"Центральная гипотеза — Primordocciput — предполагает первичную точку смещения на кранио-цервикальном переходе (C0), из которой может происходить системная асимметрия. Она сформулирована как гипотеза, а не факт.",
  s7_r3tag:"проверяемость", s7_r3t:"Критерии фальсификации", s7_r3b:"Каждое ключевое утверждение сопровождается условиями, при которых оно считалось бы ложным.",
  s7_r4tag:"фронтир", s7_r4t:"Открытые вопросы", s7_r4b:"Механизмы, устойчивость изменений, вариативность в популяции и границы применимости остаются открытыми.",
  s7_note:"<b>Требование конструкции:</b> наблюдения и гипотезы всегда маркируются как таковые. Научная скромность встроена в эту платформу.",

  s8_eyebrow:"07 · Библиотека случаев", s8_title:"Библиотека случаев.",
  s8_lead:"Структурированная библиотека случаев документирует конфигурации во времени. Каждый случай фиксируется по пяти измерениям — организованным для сравнения, а не для убеждения.",
  s8_d1k:"Паттерн симптомов", s8_d1v:"Какие сигналы, на какой стороне, в каком сочетании — на старте наблюдения.",
  s8_d2k:"Паттерн конфигурации", s8_d2v:"Структурная картина: ось, компенсации, распределение нагрузки.",

  s8_disc:"<b>Примечание:</b> случаи — это наблюдательные записи. Они иллюстрируют подход, но не доказывают эффективность.",

  s9_eyebrow:"08 · Вопросы", s9_title:"Честные ответы на честные вопросы.",
  s9_q1:"PRIMORDIS — это медицинский сервис?",
  s9_a1:"Нет. PRIMORDIS — исследовательская навигационная платформа. Она не диагностирует и не лечит заболевания и не заменяет медицинскую помощь. При наличии медицинского состояния обратитесь к квалифицированному врачу.",
  s9_q2:"Что установлено, а что — гипотеза?",

  s9_q3:"Что включает оценка?",
  s9_a3:"Визуальное и постуральное наблюдение по заданным референсным точкам, паттерны движения и структурированное самонаблюдение. Результат — карта конфигурации, а не диагноз.",

  s9_q5:"Как PRIMORDIS связан с антропономией?",
  s9_a5:"PRIMORDIS — один из прикладных методов в рамках формирующейся дисциплины «антропономия», изучающей цепь от структурного ограничения к функциональной доступности и реализации потенциала. Данные и методы платформы спроектированы совместимыми с этой более широкой рамкой.",

  s10_lead:"Первый шаг — оценка: ваша конфигурация наблюдается, измеряется и картируется. Маршрут начинается с карты.",

  s9_eyebrow:"08 · よくある質問",
  s9_title:"正直な質問への誠実な回答。",
  s9_q1:"PRIMORDISは医療サービスですか？",
  s9_a1:"いいえ。PRIMORDISは研究主導のナビゲーションプラットフォームです。疾患の診断や治療は行わず、医療ケアの代替ともなりません。医療状態がある場合は、資格を持つ医師にご相談ください。",
  s9_q2:"何が確立されており、何が仮説ですか？",
  s9_a2:"記録された観察——構造化されたケース記録——が実証的層を形成します。Primordocciput仮説を含む説明的主張は、研究中の仮説として明示的に表示されています。",
  s9_q3:"評価には何が含まれますか？",
  s9_a3:"定義された参照点からの視覚的・姿勢的観察、動作パターン、構造化した自己観察。出力はコンフィギュレーションマップであり、診断ではありません。",
  s9_q4:"どのような結果を期待すべきですか？",
  s9_a4:"結果は約束されません。プラットフォームの約束は異なります：推奨前の測定、各ステップ後の観察、そして変わったこと——変わらなかったことの誠実な記録。",
  s9_q5:"PRIMORDISはAnthroponomyとどのように関係しますか？",
  s9_a5:"PRIMORDISは、構造的制約から機能的アクセシビリティ、潜在能力の実現までの連鎖を研究する新興学問Anthroponomyの応用的方法の一つです。",
  s10_eyebrow:"09 · ナビゲーション開始",
  s10_title:"ナビゲーションを始める。",

// ---------- state (in-memory; add persistence on deployment if desired) ----------
let currentLang = "en";
let currentTheme = "dark";

// auto-detect language
(function(){
  const nav = (navigator.language || "en").toLowerCase();
  if(nav.startsWith("ru") || nav.startsWith("uk") || nav.startsWith("kk") || nav.startsWith("ky") || nav.startsWith("uz")) currentLang = "ru";
  else if(nav.startsWith("de")) currentLang = "de";
  else if(nav.startsWith("es")) currentLang = "es";
  else if(nav.startsWith("fr")) currentLang = "fr";
  else if(nav.startsWith("ar")) currentLang = "ar";
  else if(nav.startsWith("zh")) currentLang = "zh";
  else if(nav.startsWith("ja")) currentLang = "ja";
  else if(nav.startsWith("ko")) currentLang = "ko";
})();

function applyLang(lang){
  currentLang = lang;
  const dict = I18N[lang];
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key = el.getAttribute("data-i18n");
    if(dict[key] !== undefined) el.innerHTML = dict[key];
  });
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
  document.querySelectorAll(".lang button").forEach(b=>{
    b.classList.toggle("on", b.getAttribute("data-lang") === lang);
  });
}

function applyTheme(theme){
  currentTheme = theme;
  document.documentElement.setAttribute("data-theme", theme);
  const icon = document.getElementById("themeIcon");
  if(theme === "dark"){
    icon.innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  } else {
    icon.innerHTML = '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>';
  }
}

document.querySelectorAll(".lang button").forEach(b=>{
  b.addEventListener("click", ()=>applyLang(b.getAttribute("data-lang")));
});
document.getElementById("themeBtn").addEventListener("click", ()=>{
  applyTheme(currentTheme === "dark" ? "light" : "dark");
});

// reveal on scroll
const io = new IntersectionObserver(entries=>{
  entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target); } });
},{threshold:0.08});
document.querySelectorAll(".reveal").forEach(el=>io.observe(el));

applyLang(currentLang);
applyTheme("dark");
</script>
